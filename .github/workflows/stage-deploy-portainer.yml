name: Stage - Portainer

on:
  workflow_call:
    outputs:
      stack-id:
        description: Created or updated stack ID
        value: ${{ jobs.portainer.outputs['stack-id'] }}
      operation:
        description: Operation executed (deploy|update)
        value: ${{ jobs.portainer.outputs.operation }}
    inputs:
      gh-runner:
        description: Github Operating system runner label (ubuntu-latest, windows-latest, macos-latest, self-hosted, etc.)
        required: false
        type: string
        default: ubuntu-latest
      endpoint-id:
        description: Portainer endpoint ID
        required: true
        type: string
        default: ""
      swarm-id:
        description: Swarm cluster ID
        required: true
        type: string
        default: ""
      stack-type:
        description: swarm | standalone
        required: true
        type: string
        default: swarm
      stack-name:
        description: Stack name
        required: true
        type: string
        default: ""
      stack-file-content:
        description: Stack/compose text content
        required: false
        type: string
        default: ""
      stack-file-path:
        description: Path to stack/compose file in repository
        required: false
        type: string
        default: ""
      full-image-name:
        description: Build stage output for full image reference
        required: false
        type: string
        default: ""
      image-registry:
        description: Build stage output for image registry
        required: false
        type: string
        default: ""
      image-namespace:
        description: Build stage output for image namespace
        required: false
        type: string
        default: ""
      image-repository:
        description: Build stage output for image repository
        required: false
        type: string
        default: ""
      image-tag:
        description: Build stage output for image tag
        required: false
        type: string
        default: ""
    secrets:
      PORTAINER_URL:
        required: true
      PORTAINER_TOKEN:
        required: true

jobs:
  portainer:
    runs-on: ${{ inputs.gh-runner }}
    outputs:
      stack-id: ${{ steps.run.outputs['stack-id'] }}
      operation: ${{ steps.run.outputs.operation }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Local actions resolve against the job workspace, so check this
      # repository out next to the consumer code at the same ref this
      # reusable workflow was called with (falls back to the default branch).
      - name: Checkout OFA-Tech actions
        uses: actions/checkout@v6
        with:
          repository: OFA-Tech/.github
          ref: ${{ github.job_workflow_sha }}
          path: .ofa-tech-actions

      - name: Check if stack exists
        id: stack
        uses: ./.ofa-tech-actions/actions/portainer/stack-exists
        with:
          portainer-url: ${{ secrets.PORTAINER_URL }}
          api-key: ${{ secrets.PORTAINER_TOKEN }}
          endpoint-id: ${{ inputs.endpoint-id }}
          stack-name: ${{ inputs.stack-name }}
          stack-type: ${{ inputs.stack-type }}
      
      - name: Run Portainer operation
        id: run
        uses: ./.ofa-tech-actions/actions/portainer/deploy-update
        env:
          WF_OUTPUT_DOCKER_IMAGE: ${{ inputs.full-image-name }}
          WF_OUTPUT_DOCKER_IMAGE_FULL: ${{ inputs.full-image-name }}
          WF_OUTPUT_DOCKER_IMAGE_REGISTRY: ${{ inputs.image-registry }}
          WF_OUTPUT_DOCKER_IMAGE_NAMESPACE: ${{ inputs.image-namespace }}
          WF_OUTPUT_DOCKER_IMAGE_REPOSITORY: ${{ inputs.image-repository }}
          WF_OUTPUT_DOCKER_IMAGE_TAG: ${{ inputs.image-tag }}
        with:
          portainer-url: ${{ secrets.PORTAINER_URL }}
          api-key: ${{ secrets.PORTAINER_TOKEN }}
          endpoint-id: ${{ inputs.endpoint-id }}
          stack-type: ${{ inputs.stack-type }}
          operation: ${{ steps.stack.outputs.exists == 'true' && 'update' || 'deploy' }}
          stack-id: ${{ steps.stack.outputs.stack-id }}
          stack-name: ${{ inputs.stack-name }}
          stack-file-content: ${{ inputs.stack-file-content }}
          stack-file-path: ${{ inputs.stack-file-path }}
          swarm-id: ${{ inputs.swarm-id }}
