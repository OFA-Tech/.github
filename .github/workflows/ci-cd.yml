name: OFA-Tech CI/CD Core

on:
  workflow_call:
    outputs:
      full-image-name:
        description: Full resolved docker image reference (with tag)
        value: ${{ jobs.build-docker.outputs['full-image-name'] }}
      image-registry:
        description: Resolved docker registry
        value: ${{ jobs.build-docker.outputs['image-registry'] }}
      image-namespace:
        description: Resolved docker namespace
        value: ${{ jobs.build-docker.outputs['image-namespace'] }}
      image-repository:
        description: Resolved docker repository
        value: ${{ jobs.build-docker.outputs['image-repository'] }}
      image-tag:
        description: Resolved docker image tag
        value: ${{ jobs.build-docker.outputs['image-tag'] }}
      deploy-stack-id:
        description: Portainer stack ID created/updated during deploy stage
        value: ${{ jobs.deploy-portainer.outputs['stack-id'] }}
      deploy-operation:
        description: Deploy stage operation (deploy|update)
        value: ${{ jobs.deploy-portainer.outputs.operation }}
      rollback-stack-id:
        description: Stack ID targeted by rollback
        value: ${{ jobs['auto-rollback'].outputs['stack-id'] }}
      rollback-target-version:
        description: Version used when rollback runs
        value: ${{ jobs['auto-rollback'].outputs['rollback-to'] }}
    inputs:
      gh-runner:
        description: Github Operating system runner label (ubuntu-latest, windows-latest, macos-latest, self-hosted, etc.)
        required: false
        type: string
        default: ubuntu-latest
      language:
        description: Programming language (dotnet, node, java, python, go, php, cpp)
        required: true
        type: string
      language-version:
        description: Runtime version
        required: false
        type: string
        default: ""
      language-distribution:
        description: Optional language distribution override
        required: false
        type: string
        default: ""
      working-directory:
        description: Application working directory for commands
        required: false
        type: string
        default: .
      build-command:
        description: Optional build command override
        required: false
        type: string
        default: ""
      run-unit-tests:
        description: Enables unit test step
        required: false
        type: boolean
        default: true
      unit-test-command:
        description: Optional unit test command override
        required: false
        type: string
        default: ""
      run-integration-tests:
        description: Enables integration test step
        required: false
        type: boolean
        default: false
      integration-test-command:
        description: Optional integration test command override
        required: false
        type: string
        default: ""
      run-sonar:
        description: Enables SonarQube step
        required: false
        type: boolean
        default: false
      sonar-enforce-quality-gate:
        description: Fail stage if quality gate is red
        required: false
        type: boolean
        default: false
      sonar-exclusions:
        description: Optional custom Sonar exclusions
        required: false
        type: string
        default: ""
      generate-docker-image:
        description: Enables docker image build and push step
        required: false
        type: boolean 
        default: true
      docker-registry:
        description: Docker registry override (e.g. docker.io, ghcr.io, etc.)
        required: false
        type: string
        default: docker.io
      docker-image-namespace:
        description: Docker account/namespace override
        required: false
        type: string
        default: ""
      docker-image-repository:
        description: Optional image repository name override (repository only)
        required: false
        type: string
        default: ""
      docker-image-tag:
        description: Optional explicit image tag version
        required: false
        type: string
        default: "" 
      docker-image-environment:
        description: Build environment for tag version prefix (development, staging, production)
        required: false
        type: string
        default: "production"
      dockerfile-path:
        description: Dockerfile path
        required: false
        type: string
        default: Dockerfile
      run-deploy:
        description: Enables deployment stage
        required: false
        type: boolean
        default: true
      portainer-endpoint-id:
        description: Portainer endpoint ID
        required: true
        type: string
        default: ""
      portainer-swarm-id:
        description: Swarm cluster ID
        required: true
        type: string
        default: ""
      portainer-stack-type:
        description: swarm | standalone
        required: true
        type: string
        default: swarm
      portainer-stack-name:
        description: Stack name
        required: true
        type: string
        default: ""
      portainer-stack-file-content:
        description: Stack/compose text content
        required: false
        type: string
        default: ""
      portainer-stack-file-path:
        description: Path to stack/compose file in repository
        required: false
        type: string
        default: ""
      run-post-deploy-tests:
        description: Enables post-deployment test stage
        required: false
        type: boolean
        default: true
      run-health-check:
        description: Run health check stage
        required: false
        type: boolean
        default: true
      health-check-url:
        description: URL for HTTP health check
        required: false
        type: string
        default: ""
      health-check-retries:
        description: Number of retries for health checks
        required: false
        type: string
        default: "10"
      rollback-to:
        description: Optional Portainer rollback target version
        required: false
        type: string
        default: ""
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SONAR_PROJECT_KEY:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      PORTAINER_URL:
        required: true
      PORTAINER_TOKEN:
        required: true


jobs:
  build-docker:
    uses: OFA-TECH/.github/.github/workflows/stage-build.yml@main
    with:
      gh-runner: ${{ inputs.gh-runner }}
      language: ${{ inputs.language }}
      language-version: ${{ inputs.language-version }}
      language-distribution: ${{ inputs.language-distribution }}
      working-directory: ${{ inputs.working-directory }}
      build-command: ${{ inputs.build-command }}
      run-unit-tests: ${{ inputs.run-unit-tests }}
      unit-test-command: ${{ inputs.unit-test-command }}
      run-integration-tests: ${{ inputs.run-integration-tests }}
      integration-test-command: ${{ inputs.integration-test-command }}
      run-sonar: ${{ inputs.run-sonar }}
      sonar-enforce-quality-gate: ${{ inputs.sonar-enforce-quality-gate}}
      sonar-exclusions: ${{ inputs.sonar-exclusions }}
      generate-docker-image: ${{ inputs.generate-docker-image }}
      docker-registry: ${{ inputs.docker-registry }}
      docker-image-namespace: ${{ inputs.docker-image-namespace }}
      docker-image-repository: ${{ inputs.docker-image-repository }}
      docker-image-tag: ${{ inputs.docker-image-tag }}
      docker-image-environment: ${{ inputs.docker-image-environment }}
      dockerfile-path: ${{ inputs.dockerfile-path }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy-portainer:
    if: ${{ inputs.run-deploy }}
    needs: [build-docker]
    uses: OFA-TECH/.github/.github/workflows/stage-deploy-portainer.yml@main
    with:
      gh-runner: ${{ inputs.gh-runner }}
      stack-type: ${{ inputs.portainer-stack-type }}
      swarm-id: ${{ inputs.portainer-swarm-id }}
      endpoint-id: ${{ inputs.portainer-endpoint-id }}
      stack-name: ${{ inputs.portainer-stack-name }}
      stack-file-path: ${{ inputs.portainer-stack-file-path }}
      stack-file-content: ${{ inputs.portainer-stack-file-content }}
      full-image-name: ${{ needs.build-docker.outputs['full-image-name'] }}
      image-registry: ${{ needs.build-docker.outputs['image-registry'] }}
      image-namespace: ${{ needs.build-docker.outputs['image-namespace'] }}
      image-repository: ${{ needs.build-docker.outputs['image-repository'] }}
      image-tag: ${{ needs.build-docker.outputs['image-tag'] }}
    secrets:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}

  post-deploy:
    if: ${{  inputs.run-post-deploy-tests }}
    needs: [build-docker, deploy-portainer]
    uses: OFA-TECH/.github/.github/workflows/stage-post-deploy.yml@main
    with:
      gh-runner: ${{ inputs.gh-runner }}
      run-health-check: ${{ inputs.run-health-check }}
      health-check-url: ${{ inputs.health-check-url }}
      health-check-retries: ${{ inputs.health-check-retries }}

  auto-rollback:
    if: ${{needs.post-deploy.result == 'failure'}}
    needs: [build-docker, deploy-portainer,  post-deploy]
    uses: OFA-TECH/.github/.github/workflows/stage-rollback-portainer.yml@main
    with:
      gh-runner: ${{ inputs.gh-runner }}
      endpoint-id: ${{ inputs.portainer-endpoint-id }}
      stack-name: ${{ inputs.portainer-stack-name }}
      rollback-to: ${{ inputs.rollback-to }}
    secrets:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}