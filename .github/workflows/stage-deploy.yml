name: Stage - Deploy SFTP

on:
  workflow_call:
    inputs:
      deploy-mode:
        description: Deploy mode (sftp, docker-compose, docker-run, docker-swarm)
        required: false
        type: string
        default: sftp
      artifact-name:
        description: Name of uploaded artifact to deploy
        required: true
        type: string
      artifact-path:
        description: Path where artifact should be downloaded
        required: false
        type: string
        default: ./artifact
      deploy-host:
        description: Destination host
        required: false
        type: string
        default: ""
      deploy-port:
        description: SSH port
        required: false
        type: string
        default: "22"
      deploy-username:
        description: SSH username
        required: false
        type: string
        default: ""
      deploy-remote-path:
        description: Destination path on server
        required: false
        type: string
        default: ""
      docker-image:
        description: Docker image reference for deploy modes using containers
        required: false
        type: string
        default: ""
      docker-compose-file:
        description: Remote docker compose file path
        required: false
        type: string
        default: docker-compose.yml
      docker-run-command:
        description: Remote docker run command (without leading docker)
        required: false
        type: string
        default: ""
      docker-swarm-service-name:
        description: Swarm service name (required for docker-swarm mode)
        required: false
        type: string
        default: ""
      docker-swarm-replicas:
        description: Optional replicas for docker-swarm mode
        required: false
        type: string
        default: ""
      docker-registry:
        description: Optional registry host used for docker login on remote server
        required: false
        type: string
        default: docker.io
      docker-username:
        description: Optional docker username override for remote login
        required: false
        type: string
        default: ""
      docker-password:
        description: Optional docker password/token override for remote login
        required: false
        type: string
        default: ""
      deploy-source-glob:
        description: Files to upload relative to artifact-path
        required: false
        type: string
        default: "**/*"
      deploy-strip-components:
        description: Number of path components to strip
        required: false
        type: string
        default: "0"
      deploy-overwrite:
        description: Overwrite files on destination
        required: false
        type: boolean
        default: true
      deploy-clean-remote:
        description: Remove remote path before upload
        required: false
        type: boolean
        default: false
      runner:
        description: Runner label
        required: false
        type: string
        default: ubuntu-latest
    secrets:
      deploy-ssh-private-key:
        required: false
      docker-password:
        required: false
      docker-username:
        required: false

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    env:
      RESOLVED_DEPLOY_MODE: ${{ inputs.deploy-mode }}
      RESOLVED_DEPLOY_HOST: ${{ inputs.deploy-host }}
      RESOLVED_DEPLOY_PORT: ${{ inputs.deploy-port }}
      RESOLVED_DEPLOY_USERNAME: ${{ inputs.deploy-username }}
      RESOLVED_DEPLOY_REMOTE_PATH: ${{ inputs.deploy-remote-path }}
      RESOLVED_SSH_PRIVATE_KEY: ${{ secrets.deploy-ssh-private-key }}
      RESOLVED_DOCKER_USERNAME: ${{ inputs.docker-username != '' && inputs.docker-username || secrets.docker-username != '' && secrets.docker-username || vars.DOCKER_USERNAME }}
      RESOLVED_DOCKER_PASSWORD: ${{ inputs.docker-password != '' && inputs.docker-password || secrets.docker-password != '' && secrets.docker-password || secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Validate deploy configuration
        if: ${{ env.RESOLVED_DEPLOY_HOST == '' || env.RESOLVED_DEPLOY_USERNAME == '' || env.RESOLVED_DEPLOY_REMOTE_PATH == '' || env.RESOLVED_SSH_PRIVATE_KEY == '' }}
        shell: bash
        run: |
          echo "Missing deploy configuration. Ensure host, username, remote path and private key are available via inputs, secrets, or org/repo vars." >&2
          exit 1

      - name: Download artifact
        if: ${{ env.RESOLVED_DEPLOY_MODE == 'sftp' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}

      - name: Upload to SFTP
        if: ${{ env.RESOLVED_DEPLOY_MODE == 'sftp' }}
        uses: OFA-TECH/.github/actions/ssh/upload@main
        with:
          host: ${{ env.RESOLVED_DEPLOY_HOST }}
          port: ${{ env.RESOLVED_DEPLOY_PORT }}
          username: ${{ env.RESOLVED_DEPLOY_USERNAME }}
          source: ${{ inputs.artifact-path }}/${{ inputs.deploy-source-glob }}
          target: ${{ env.RESOLVED_DEPLOY_REMOTE_PATH }}
          strip-components: ${{ inputs.deploy-strip-components }}
          overwrite: ${{ inputs.deploy-overwrite }}
          clean-remote: ${{ inputs.deploy-clean-remote }}
          ssh-private-key: ${{ env.RESOLVED_SSH_PRIVATE_KEY }}

      - name: Validate docker-compose deploy configuration
        if: ${{ env.RESOLVED_DEPLOY_MODE == 'docker-compose' && inputs.docker-image == '' }}
        shell: bash
        run: |
          echo "docker-image is required for deploy-mode docker-compose." >&2
          exit 1

      - name: Deploy with docker compose
        if: ${{ env.RESOLVED_DEPLOY_MODE == 'docker-compose' }}
        uses: OFA-TECH/.github/actions/ssh/command@main
        with:
          host: ${{ env.RESOLVED_DEPLOY_HOST }}
          port: ${{ env.RESOLVED_DEPLOY_PORT }}
          username: ${{ env.RESOLVED_DEPLOY_USERNAME }}
          ssh-private-key: ${{ env.RESOLVED_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            if [ -n "${{ env.RESOLVED_DOCKER_PASSWORD }}" ]; then
              echo "${{ env.RESOLVED_DOCKER_PASSWORD }}" | docker login "${{ inputs.docker-registry }}" -u "${{ env.RESOLVED_DOCKER_USERNAME }}" --password-stdin
            fi
            docker pull "${{ inputs.docker-image }}"
            docker compose -f "${{ inputs.docker-compose-file }}" up -d

      - name: Validate docker-run deploy configuration
        if: ${{ env.RESOLVED_DEPLOY_MODE == 'docker-run' && (inputs.docker-image == '' || inputs.docker-run-command == '') }}
        shell: bash
        run: |
          echo "docker-image and docker-run-command are required for deploy-mode docker-run." >&2
          exit 1

      - name: Validate docker-swarm deploy configuration
        if: ${{ env.RESOLVED_DEPLOY_MODE == 'docker-swarm' && (inputs.docker-image == '' || inputs.docker-swarm-service-name == '') }}
        shell: bash
        run: |
          echo "docker-image and docker-swarm-service-name are required for deploy-mode docker-swarm." >&2
          exit 1

      - name: Deploy with docker run
        if: ${{ env.RESOLVED_DEPLOY_MODE == 'docker-run' }}
        uses: OFA-TECH/.github/actions/ssh/command@main
        with:
          host: ${{ env.RESOLVED_DEPLOY_HOST }}
          port: ${{ env.RESOLVED_DEPLOY_PORT }}
          username: ${{ env.RESOLVED_DEPLOY_USERNAME }}
          ssh-private-key: ${{ env.RESOLVED_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            if [ -n "${{ env.RESOLVED_DOCKER_PASSWORD }}" ]; then
              echo "${{ env.RESOLVED_DOCKER_PASSWORD }}" | docker login "${{ inputs.docker-registry }}" -u "${{ env.RESOLVED_DOCKER_USERNAME }}" --password-stdin
            fi
            docker pull "${{ inputs.docker-image }}"
            docker ${{ inputs.docker-run-command }}

      - name: Deploy with docker swarm service
        if: ${{ env.RESOLVED_DEPLOY_MODE == 'docker-swarm' }}
        uses: OFA-TECH/.github/actions/ssh/command@main
        with:
          host: ${{ env.RESOLVED_DEPLOY_HOST }}
          port: ${{ env.RESOLVED_DEPLOY_PORT }}
          username: ${{ env.RESOLVED_DEPLOY_USERNAME }}
          ssh-private-key: ${{ env.RESOLVED_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            if [ -n "${{ env.RESOLVED_DOCKER_PASSWORD }}" ]; then
              echo "${{ env.RESOLVED_DOCKER_PASSWORD }}" | docker login "${{ inputs.docker-registry }}" -u "${{ env.RESOLVED_DOCKER_USERNAME }}" --password-stdin
            fi
            docker pull "${{ inputs.docker-image }}"
            if docker service inspect "${{ inputs.docker-swarm-service-name }}" >/dev/null 2>&1; then
              if [ -n "${{ inputs.docker-swarm-replicas }}" ]; then
                docker service update --image "${{ inputs.docker-image }}" --replicas "${{ inputs.docker-swarm-replicas }}" "${{ inputs.docker-swarm-service-name }}"
              else
                docker service update --image "${{ inputs.docker-image }}" "${{ inputs.docker-swarm-service-name }}"
              fi
            else
              if [ -n "${{ inputs.docker-swarm-replicas }}" ]; then
                docker service create --name "${{ inputs.docker-swarm-service-name }}" --replicas "${{ inputs.docker-swarm-replicas }}" "${{ inputs.docker-image }}"
              else
                docker service create --name "${{ inputs.docker-swarm-service-name }}" "${{ inputs.docker-image }}"
              fi
            fi
