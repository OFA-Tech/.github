name: Stage - Rollback

on:
  workflow_call:
    inputs:
      strategy:
        description: Rollback strategy (portainer, docker, ssh-artifact)
        required: true
        type: string
      runner:
        description: Runner label
        required: false
        type: string
        default: self-hosted

      deploy-host:
        description: Remote host for docker/ssh rollback
        required: false
        type: string
        default: ""
      deploy-port:
        description: SSH port
        required: false
        type: string
        default: "22"
      deploy-username:
        description: SSH username
        required: false
        type: string
        default: ""

      ssh-rollback-command:
        description: Command to execute for ssh-artifact rollback
        required: false
        type: string
        default: ""

      docker-mode:
        description: Docker rollback mode (swarm or standalone)
        required: false
        type: string
        default: swarm
      docker-swarm-service-name:
        description: Swarm service to rollback
        required: false
        type: string
        default: ""
      docker-rollback-command:
        description: Custom command for standalone docker rollback
        required: false
        type: string
        default: ""

      portainer-url:
        description: Portainer URL override
        required: false
        type: string
        default: ""
      portainer-endpoint-id:
        description: Portainer endpoint ID override
        required: false
        type: string
        default: ""
      portainer-stack-id:
        description: Portainer stack ID for rollback
        required: false
        type: string
        default: ""
      portainer-rollback-to:
        description: Optional Portainer rollback target version
        required: false
        type: string
        default: ""
      portainer-prune:
        description: Prune during Portainer rollback
        required: false
        type: boolean
        default: false
      portainer-repull-image-and-redeploy:
        description: Repull image during Portainer rollback
        required: false
        type: boolean
        default: true

    secrets:
      deploy-ssh-private-key:
        required: false
      portainer-api-key:
        required: false

jobs:
  rollback:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    env:
      RESOLVED_HOST: ${{ inputs.deploy-host }}
      RESOLVED_PORT: ${{ inputs.deploy-port }}
      RESOLVED_USERNAME: ${{ inputs.deploy-username }}
      RESOLVED_SSH_PRIVATE_KEY: ${{ secrets.deploy-ssh-private-key }}
      RESOLVED_PORTAINER_URL: ${{ inputs.portainer-url }}
      RESOLVED_PORTAINER_ENDPOINT_ID: ${{ inputs.portainer-endpoint-id }}
      RESOLVED_PORTAINER_API_KEY: ${{ secrets.portainer-api-key }}

    steps:
      - name: Validate rollback configuration
        shell: bash
        run: |
          set -euo pipefail

          case "${{ inputs.strategy }}" in
            portainer)
              [[ -n "${RESOLVED_PORTAINER_URL}" ]] || { echo "Missing Portainer URL"; exit 1; }
              [[ -n "${RESOLVED_PORTAINER_ENDPOINT_ID}" ]] || { echo "Missing Portainer endpoint ID"; exit 1; }
              [[ -n "${RESOLVED_PORTAINER_API_KEY}" ]] || { echo "Missing Portainer API key"; exit 1; }
              [[ -n "${{ inputs.portainer-stack-id }}" ]] || { echo "Missing portainer-stack-id"; exit 1; }
              ;;
            docker)
              [[ -n "${RESOLVED_HOST}" ]] || { echo "Missing deploy host"; exit 1; }
              [[ -n "${RESOLVED_USERNAME}" ]] || { echo "Missing deploy username"; exit 1; }
              [[ -n "${RESOLVED_SSH_PRIVATE_KEY}" ]] || { echo "Missing ssh private key"; exit 1; }
              if [[ "${{ inputs.docker-mode }}" = "swarm" ]]; then
                [[ -n "${{ inputs.docker-swarm-service-name }}" ]] || { echo "Missing docker-swarm-service-name"; exit 1; }
              else
                [[ -n "${{ inputs.docker-rollback-command }}" ]] || { echo "Missing docker-rollback-command"; exit 1; }
              fi
              ;;
            ssh-artifact)
              [[ -n "${RESOLVED_HOST}" ]] || { echo "Missing deploy host"; exit 1; }
              [[ -n "${RESOLVED_USERNAME}" ]] || { echo "Missing deploy username"; exit 1; }
              [[ -n "${RESOLVED_SSH_PRIVATE_KEY}" ]] || { echo "Missing ssh private key"; exit 1; }
              [[ -n "${{ inputs.ssh-rollback-command }}" ]] || { echo "Missing ssh-rollback-command"; exit 1; }
              ;;
            *)
              echo "Unsupported strategy: ${{ inputs.strategy }}" >&2
              exit 1
              ;;
          esac

      - name: Rollback Portainer stack
        if: ${{ inputs.strategy == 'portainer' }}
        uses: ./actions/portainer/rollback
        with:
          portainer-url: ${{ env.RESOLVED_PORTAINER_URL }}
          api-key: ${{ env.RESOLVED_PORTAINER_API_KEY }}
          endpoint-id: ${{ env.RESOLVED_PORTAINER_ENDPOINT_ID }}
          stack-id: ${{ inputs.portainer-stack-id }}
          rollback-to: ${{ inputs.portainer-rollback-to }}
          prune: ${{ inputs.portainer-prune && 'true' || 'false' }}
          repull-image-and-redeploy: ${{ inputs.portainer-repull-image-and-redeploy && 'true' || 'false' }}

      - name: Rollback Docker Swarm service
        if: ${{ inputs.strategy == 'docker' && inputs.docker-mode == 'swarm' }}
        uses: ./actions/ssh/command
        with:
          host: ${{ env.RESOLVED_HOST }}
          port: ${{ env.RESOLVED_PORT }}
          username: ${{ env.RESOLVED_USERNAME }}
          ssh-private-key: ${{ env.RESOLVED_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            docker service rollback "${{ inputs.docker-swarm-service-name }}"

      - name: Rollback Docker standalone
        if: ${{ inputs.strategy == 'docker' && inputs.docker-mode == 'standalone' }}
        uses: ./actions/ssh/command
        with:
          host: ${{ env.RESOLVED_HOST }}
          port: ${{ env.RESOLVED_PORT }}
          username: ${{ env.RESOLVED_USERNAME }}
          ssh-private-key: ${{ env.RESOLVED_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            ${{ inputs.docker-rollback-command }}

      - name: Rollback via SSH command
        if: ${{ inputs.strategy == 'ssh-artifact' }}
        uses: ./actions/ssh/command
        with:
          host: ${{ env.RESOLVED_HOST }}
          port: ${{ env.RESOLVED_PORT }}
          username: ${{ env.RESOLVED_USERNAME }}
          ssh-private-key: ${{ env.RESOLVED_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            ${{ inputs.ssh-rollback-command }}
