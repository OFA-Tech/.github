name: Stage - Post Deploy Tests

on:
  workflow_call:
    inputs:
      gh-runner:
        description: Github Operating system runner label (ubuntu-latest, windows-latest, macos-latest, self-hosted, etc.)
        required: false
        type: string
        default: ubuntu-latest
      run-health-check:
        description: Run health check stage
        required: false
        type: boolean
        default: true
      health-check-url:
        description: URL for HTTP health check
        required: false
        type: string
        default: ""
      health-check-retries:
        description: Number of retries for health checks
        required: false
        type: string
        default: "10"
      

jobs:
  post-deploy-tests:
    runs-on: ${{ inputs.gh-runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Health check with HTTP probe
        if: ${{ inputs.run-health-check }}
        shell: bash
        run: |
          set -euo pipefail
          expected="200"
          retries="${{ inputs.health-check-retries }}"
          interval="10"

          i=1
          while [ "$i" -le "$retries" ]; do
            code="$(curl -s -o /dev/null -w "%{http_code}" "${{ inputs.health-check-url }}" || true)"
            if [ "$code" = "$expected" ]; then
              echo "Health check succeeded with status $code"
              exit 0
            fi
            echo "Health check attempt $i/$retries failed (status=$code, expected=$expected)."
            i=$((i + 1))
            sleep "$interval"
          done

          echo "Health check failed after $retries attempts." >&2
          exit 1
