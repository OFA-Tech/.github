name: Stage - Docker

on:
  workflow_call:
    outputs:
      image:
        description: Resolved image repository
        value: ${{ jobs.docker.outputs.image }}
      version:
        description: Resolved image version
        value: ${{ jobs.docker.outputs.version }}
      image-version-tag:
        description: Resolved image version tag
        value: ${{ jobs.docker.outputs.image-version-tag }}
      image-latest-tag:
        description: Resolved image latest tag
        value: ${{ jobs.docker.outputs.image-latest-tag }}
    inputs:
      runner:
        description: Runner label
        required: false
        type: string
        default: ubuntu-latest
      docker-registry:
        description: Container registry host
        required: false
        type: string
        default: docker.io
      docker-account:
        description: Docker account/namespace override
        required: false
        type: string
        default: ""
      docker-image-name:
        description: Optional image repository name override (repository only)
        required: false
        type: string
        default: ""
      docker-environment:
        description: Build environment for version prefix (development, staging, production)
        required: false
        type: string
        default: ""
      dockerfile:
        description: Dockerfile path
        required: false
        type: string
        default: Dockerfile
      docker-context:
        description: Docker build context
        required: false
        type: string
        default: .
      docker-version:
        description: Optional explicit image version
        required: false
        type: string
        default: ""
      docker-push-latest:
        description: Also push latest tag
        required: false
        type: boolean
        default: true
      docker-username:
        description: Optional docker registry username override
        required: false
        type: string
        default: ""
      docker-password:
        description: Optional docker registry password override
        required: false
        type: string
        default: ""
    secrets:
      docker-password:
        required: false
      docker-username:
        required: false
      docker-account:
        required: false
      docker-image-name:
        required: false

jobs:
  docker:
    runs-on: ${{ inputs.runner }}
    outputs:
      image: ${{ steps.docker.outputs.image }}
      version: ${{ steps.docker.outputs.version }}
      image-version-tag: ${{ steps.docker.outputs.image-version-tag }}
      image-latest-tag: ${{ steps.docker.outputs.image-latest-tag }}
    permissions:
      contents: read
      packages: write
    env:
      RESOLVED_DOCKER_USERNAME: ${{ inputs.docker-username != '' && inputs.docker-username || secrets.docker-username != '' && secrets.docker-username || vars.DOCKER_USERNAME }}
      RESOLVED_DOCKER_PASSWORD: ${{ inputs.docker-password != '' && inputs.docker-password || secrets.docker-password != '' && secrets.docker-password || secrets.DOCKERHUB_TOKEN }}
      RESOLVED_DOCKER_ACCOUNT: ${{ inputs.docker-account != '' && inputs.docker-account || secrets.docker-account != '' && secrets.docker-account || vars.DOCKER_ACCOUNT != '' && vars.DOCKER_ACCOUNT || 'ofa-tech' }}
      RESOLVED_DOCKER_IMAGE_NAME: ${{ inputs.docker-image-name != '' && inputs.docker-image-name || secrets.docker-image-name != '' && secrets.docker-image-name || vars.DOCKER_IMAGE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker credentials
        if: ${{ env.RESOLVED_DOCKER_USERNAME == '' || env.RESOLVED_DOCKER_PASSWORD == '' }}
        shell: bash
        run: |
          echo "Missing Docker Hub credentials. Provide both username and token/password via inputs, secrets, or repository variables." >&2
          echo "Username sources: inputs.docker-username, secrets.docker-username, vars.DOCKER_USERNAME" >&2
          echo "Token sources: inputs.docker-password, secrets.docker-password, secrets.DOCKERHUB_TOKEN" >&2
          exit 1

      - name: Build and push docker image
        id: docker
        uses: ./actions/docker/image
        env:
          DOCKER_USERNAME: ${{ env.RESOLVED_DOCKER_USERNAME }}
          DOCKER_ACCOUNT: ${{ env.RESOLVED_DOCKER_ACCOUNT }}
          DOCKER_IMAGE_NAME: ${{ env.RESOLVED_DOCKER_IMAGE_NAME }}
        with:
          registry: ${{ inputs.docker-registry }}
          account: ${{ env.RESOLVED_DOCKER_ACCOUNT }}
          docker-image-name: ${{ env.RESOLVED_DOCKER_IMAGE_NAME }}
          environment: ${{ inputs.docker-environment }}
          dockerfile: ${{ inputs.dockerfile }}
          context: ${{ inputs.docker-context }}
          version: ${{ inputs.docker-version }}
          push-latest: ${{ inputs.docker-push-latest && 'true' || 'false' }}
          username: ${{ env.RESOLVED_DOCKER_USERNAME }}
          password: ${{ env.RESOLVED_DOCKER_PASSWORD }}
