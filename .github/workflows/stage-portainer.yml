name: Stage - Portainer

on:
  workflow_call:
    inputs:
      portainer-operation:
        description: deploy | update | rollback | scale
        required: true
        type: string
      portainer-stack-type:
        description: swarm | standalone
        required: false
        type: string
        default: swarm
      portainer-stack-id:
        description: Portainer stack ID (required for update, rollback, scale)
        required: false
        type: string
        default: ""
      portainer-stack-name:
        description: Stack name (required for deploy)
        required: false
        type: string
        default: ""
      portainer-stack-file-content:
        description: Stack/compose text content (required for deploy and scale)
        required: false
        type: string
        default: ""
      portainer-stack-file-path:
        description: Path to stack/compose file in repository (alternative to content)
        required: false
        type: string
        default: ""
      portainer-swarm-id:
        description: Swarm cluster ID (required for swarm deploy)
        required: false
        type: string
        default: ""
      portainer-rollback-to:
        description: Rollback target version (optional)
        required: false
        type: string
        default: ""
      portainer-env-json:
        description: Optional JSON array of env vars for Portainer stack environment [{"name":"A","value":"B"}]
        required: false
        type: string
        default: ""
      portainer-replace-vars-json:
        description: Optional JSON object for compose file variable interpolation {"VAR":"value"}. Supports ${VAR} and ${VAR:-default}. Takes precedence over environment variables.
        required: false
        type: string
        default: ""
      portainer-prune:
        description: Prune services not referenced anymore
        required: false
        type: boolean
        default: false
      portainer-repull-image-and-redeploy:
        description: Force image repull and redeploy
        required: false
        type: boolean
        default: true
      portainer-prefer-git-redeploy:
        description: On update, prefer /stacks/{id}/git/redeploy for Git stacks
        required: false
        type: boolean
        default: true
      portainer-endpoint-id:
        description: Portainer endpoint ID
        required: false
        type: string
        default: ""
      portainer-url:
        description: Portainer base URL
        required: false
        type: string
        default: ""
      runner:
        description: Runner label
        required: false
        type: string
        default: ubuntu-latest
    secrets:
      portainer-api-key:
        required: false

jobs:
  portainer:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    env:
      RESOLVED_PORTAINER_URL: ${{ inputs.portainer-url }}
      RESOLVED_PORTAINER_ENDPOINT_ID: ${{ inputs.portainer-endpoint-id }}
      RESOLVED_PORTAINER_API_KEY: ${{ secrets.portainer-api-key }}
    steps:
      - name: Validate Portainer configuration
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${RESOLVED_PORTAINER_URL}" ]] || { echo "Missing Portainer URL"; exit 1; }
          [[ -n "${RESOLVED_PORTAINER_ENDPOINT_ID}" ]] || { echo "Missing Portainer endpoint ID"; exit 1; }
          [[ -n "${RESOLVED_PORTAINER_API_KEY}" ]] || { echo "Missing Portainer API key"; exit 1; }

      - name: Run Portainer operation
        if: ${{ inputs.portainer-operation == 'deploy' || inputs.portainer-operation == 'update' }}
        uses: OFA-TECH/.github/actions/portainer/deploy-update@main
        with:
          portainer-url: ${{ env.RESOLVED_PORTAINER_URL }}
          api-key: ${{ env.RESOLVED_PORTAINER_API_KEY }}
          endpoint-id: ${{ env.RESOLVED_PORTAINER_ENDPOINT_ID }}
          stack-type: ${{ inputs.portainer-stack-type }}
          operation: ${{ inputs.portainer-operation }}
          stack-id: ${{ inputs.portainer-stack-id }}
          stack-name: ${{ inputs.portainer-stack-name }}
          stack-file-content: ${{ inputs.portainer-stack-file-content }}
          stack-file-path: ${{ inputs.portainer-stack-file-path }}
          swarm-id: ${{ inputs.portainer-swarm-id }}
          env-json: ${{ inputs.portainer-env-json }}
          replace-vars-json: ${{ inputs.portainer-replace-vars-json }}
          prune: ${{ inputs.portainer-prune && 'true' || 'false' }}
          repull-image-and-redeploy: ${{ inputs.portainer-repull-image-and-redeploy && 'true' || 'false' }}
          prefer-git-redeploy: ${{ inputs.portainer-prefer-git-redeploy && 'true' || 'false' }}

      - name: Rollback Portainer stack
        if: ${{ inputs.portainer-operation == 'rollback' }}
        uses: OFA-TECH/.github/actions/portainer/rollback@main
        with:
          portainer-url: ${{ env.RESOLVED_PORTAINER_URL }}
          api-key: ${{ env.RESOLVED_PORTAINER_API_KEY }}
          endpoint-id: ${{ env.RESOLVED_PORTAINER_ENDPOINT_ID }}
          stack-id: ${{ inputs.portainer-stack-id }}
          rollback-to: ${{ inputs.portainer-rollback-to }}
          prune: ${{ inputs.portainer-prune && 'true' || 'false' }}
          repull-image-and-redeploy: ${{ inputs.portainer-repull-image-and-redeploy && 'true' || 'false' }}

      - name: Scale Portainer stack
        if: ${{ inputs.portainer-operation == 'scale' }}
        uses: OFA-TECH/.github/actions/portainer/scale@main
        with:
          portainer-url: ${{ env.RESOLVED_PORTAINER_URL }}
          api-key: ${{ env.RESOLVED_PORTAINER_API_KEY }}
          endpoint-id: ${{ env.RESOLVED_PORTAINER_ENDPOINT_ID }}
          stack-id: ${{ inputs.portainer-stack-id }}
          stack-file-content: ${{ inputs.portainer-stack-file-content }}
          prune: ${{ inputs.portainer-prune && 'true' || 'false' }}
          repull-image-and-redeploy: ${{ inputs.portainer-repull-image-and-redeploy && 'true' || 'false' }}