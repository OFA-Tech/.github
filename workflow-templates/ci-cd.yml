name: OFA-Tech CI/CD Core

on:
  workflow_call:
    inputs:
      language:
        description: Programming language (dotnet, node, java, python, go, php, cpp)
        required: true
        type: string
      language-version:
        description: Optional runtime version override
        required: false
        type: string
        default: ""
      distribution:
        description: Optional Java distribution override
        required: false
        type: string
        default: ""
      working-directory:
        description: Working directory for all commands
        required: false
        type: string
        default: .
      runner:
        description: Runner label for all stages
        required: false
        type: string
        default: self-hosted

      run-build:
        required: false
        type: boolean
        default: true
      build-command:
        required: false
        type: string
        default: ""

      run-tests:
        required: false
        type: boolean
        default: true
      run-unit-tests:
        required: false
        type: boolean
        default: true
      unit-test-command:
        required: false
        type: string
        default: ""
      run-integration-tests:
        required: false
        type: boolean
        default: false
      integration-test-command:
        required: false
        type: string
        default: ""
      run-mutation-tests:
        required: false
        type: boolean
        default: false
      mutation-test-command:
        required: false
        type: string
        default: ""
      test-command:
        required: false
        type: string
        default: ""

      run-sonar:
        required: false
        type: boolean
        default: false
      sonar-project-key:
        required: false
        type: string
        default: ""
      sonar-project-name:
        required: false
        type: string
        default: ""
      sonar-sources:
        required: false
        type: string
        default: .
      sonar-command:
        required: false
        type: string
        default: ""
      enforce-quality-gate:
        required: false
        type: boolean
        default: false
      sonar-token:
        required: false
        type: string
        default: ""
      sonar-host-url:
        required: false
        type: string
        default: ""

      upload-artifact:
        required: false
        type: boolean
        default: false
      artifact-name:
        required: false
        type: string
        default: build-output
      artifact-path:
        required: false
        type: string
        default: .

      run-docker-image:
        required: false
        type: boolean
        default: false
      docker-registry:
        required: false
        type: string
        default: docker.io
      docker-image-name:
        required: false
        type: string
        default: ""
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      docker-context:
        required: false
        type: string
        default: .
      docker-version:
        required: false
        type: string
        default: ""
      docker-push-latest:
        required: false
        type: boolean
        default: true
      docker-username:
        required: false
        type: string
        default: ""
      docker-password:
        required: false
        type: string
        default: ""

      run-deploy:
        required: false
        type: boolean
        default: true
      deploy-strategy:
        required: true
        type: string
      deploy-mode:
        required: false
        type: string
        default: docker-compose
      deploy-host:
        required: false
        type: string
        default: ""
      deploy-port:
        required: false
        type: string
        default: ""
      deploy-username:
        required: false
        type: string
        default: ""
      deploy-remote-path:
        required: false
        type: string
        default: ""
      deploy-source-glob:
        required: false
        type: string
        default: "**/*"
      deploy-strip-components:
        required: false
        type: string
        default: "0"
      deploy-overwrite:
        required: false
        type: boolean
        default: true
      deploy-clean-remote:
        required: false
        type: boolean
        default: false
      deploy-docker-image:
        required: false
        type: string
        default: ""
      deploy-docker-compose-file:
        required: false
        type: string
        default: docker-compose.yml
      deploy-docker-run-command:
        required: false
        type: string
        default: ""
      deploy-docker-swarm-service-name:
        required: false
        type: string
        default: ""
      deploy-docker-swarm-replicas:
        required: false
        type: string
        default: ""
      deploy-docker-registry:
        required: false
        type: string
        default: docker.io
      deploy-docker-username:
        required: false
        type: string
        default: ""
      deploy-docker-password:
        required: false
        type: string
        default: ""
      deploy-ssh-private-key:
        required: false
        type: string
        default: ""

      portainer-operation:
        required: false
        type: string
        default: update
      portainer-stack-type:
        required: false
        type: string
        default: swarm
      portainer-stack-id:
        required: false
        type: string
        default: ""
      portainer-stack-name:
        required: false
        type: string
        default: ""
      portainer-stack-file-content:
        required: false
        type: string
        default: ""
      portainer-stack-file-path:
        required: false
        type: string
        default: ""
      portainer-swarm-id:
        required: false
        type: string
        default: ""
      portainer-env-json:
        required: false
        type: string
        default: ""
      portainer-prune:
        required: false
        type: boolean
        default: false
      portainer-repull-image-and-redeploy:
        required: false
        type: boolean
        default: true
      portainer-prefer-git-redeploy:
        required: false
        type: boolean
        default: true
      portainer-endpoint-id:
        required: false
        type: string
        default: ""
      portainer-url:
        required: false
        type: string
        default: ""
      portainer-rollback-to:
        required: false
        type: string
        default: ""

      run-post-deploy-tests:
        required: false
        type: boolean
        default: true
      run-health-check:
        required: false
        type: boolean
        default: true
      health-check-url:
        required: false
        type: string
        default: ""
      health-check-command:
        required: false
        type: string
        default: ""
      health-check-expected-status:
        required: false
        type: string
        default: "200"
      health-check-retries:
        required: false
        type: string
        default: "12"
      health-check-interval-seconds:
        required: false
        type: string
        default: "10"
      run-load-test:
        required: false
        type: boolean
        default: false
      load-test-command:
        required: false
        type: string
        default: ""
      run-contract-test:
        required: false
        type: boolean
        default: false
      contract-test-command:
        required: false
        type: string
        default: ""

      run-rollback:
        required: false
        type: boolean
        default: true
      auto-rollback:
        required: false
        type: boolean
        default: true
      manual-rollback:
        required: false
        type: boolean
        default: false
      docker-rollback-command:
        required: false
        type: string
        default: ""
      ssh-rollback-command:
        required: false
        type: string
        default: ""

    secrets:
      sonar-token:
        required: false
      sonar-host-url:
        required: false
      docker-password:
        required: false
      docker-username:
        required: false
      deploy-ssh-private-key:
        required: false
      deploy-docker-password:
        required: false
      deploy-docker-username:
        required: false
      portainer-api-key:
        required: false

jobs:
  resolve-contract:
    runs-on: ${{ inputs.runner }}
    outputs:
      sonar-project-key: ${{ steps.resolve.outputs.sonar-project-key }}
      sonar-project-name: ${{ steps.resolve.outputs.sonar-project-name }}
      sonar-token: ${{ steps.resolve.outputs.sonar-token }}
      sonar-host-url: ${{ steps.resolve.outputs.sonar-host-url }}
      docker-username: ${{ steps.resolve.outputs.docker-username }}
      docker-password: ${{ steps.resolve.outputs.docker-password }}
      deploy-host: ${{ steps.resolve.outputs.deploy-host }}
      deploy-port: ${{ steps.resolve.outputs.deploy-port }}
      deploy-username: ${{ steps.resolve.outputs.deploy-username }}
      deploy-remote-path: ${{ steps.resolve.outputs.deploy-remote-path }}
      deploy-ssh-private-key: ${{ steps.resolve.outputs.deploy-ssh-private-key }}
      deploy-docker-username: ${{ steps.resolve.outputs.deploy-docker-username }}
      deploy-docker-password: ${{ steps.resolve.outputs.deploy-docker-password }}
      deploy-docker-image: ${{ steps.resolve.outputs.deploy-docker-image }}
      portainer-url: ${{ steps.resolve.outputs.portainer-url }}
      portainer-endpoint-id: ${{ steps.resolve.outputs.portainer-endpoint-id }}
      portainer-api-key: ${{ steps.resolve.outputs.portainer-api-key }}
    steps:
      - id: resolve
        shell: bash
        env:
          RESOLVED_SONAR_PROJECT_KEY: ${{ inputs.sonar-project-key != '' && inputs.sonar-project-key || vars.SONAR_PROJECT_KEY }}
          RESOLVED_SONAR_PROJECT_NAME: ${{ inputs.sonar-project-name != '' && inputs.sonar-project-name || vars.SONAR_PROJECT_NAME }}
          RESOLVED_SONAR_TOKEN: ${{ inputs.sonar-token != '' && inputs.sonar-token || secrets.sonar-token != '' && secrets.sonar-token }}
          RESOLVED_SONAR_HOST_URL: ${{ inputs.sonar-host-url != '' && inputs.sonar-host-url || secrets.sonar-host-url != '' && secrets.sonar-host-url || vars.SONAR_HOST_URL }}
          RESOLVED_DOCKER_USERNAME: ${{ inputs.docker-username != '' && inputs.docker-username || secrets.docker-username != '' && secrets.docker-username || vars.DOCKER_USERNAME }}
          RESOLVED_DOCKER_PASSWORD: ${{ inputs.docker-password != '' && inputs.docker-password || secrets.docker-password != '' && secrets.docker-password }}
          RESOLVED_DEPLOY_HOST: ${{ inputs.deploy-host != '' && inputs.deploy-host || vars.DEPLOY_HOST }}
          RESOLVED_DEPLOY_PORT: ${{ inputs.deploy-port != '' && inputs.deploy-port || vars.DEPLOY_PORT != '' && vars.DEPLOY_PORT || '22' }}
          RESOLVED_DEPLOY_USERNAME: ${{ inputs.deploy-username != '' && inputs.deploy-username || vars.DEPLOY_USERNAME }}
          RESOLVED_DEPLOY_REMOTE_PATH: ${{ inputs.deploy-remote-path != '' && inputs.deploy-remote-path || vars.DEPLOY_REMOTE_PATH }}
          RESOLVED_DEPLOY_SSH_PRIVATE_KEY: ${{ inputs.deploy-ssh-private-key != '' && inputs.deploy-ssh-private-key || secrets.deploy-ssh-private-key != '' && secrets.deploy-ssh-private-key }}
          RESOLVED_DEPLOY_DOCKER_USERNAME: ${{ inputs.deploy-docker-username != '' && inputs.deploy-docker-username || secrets.deploy-docker-username != '' && secrets.deploy-docker-username || vars.DOCKER_USERNAME }}
          RESOLVED_DEPLOY_DOCKER_PASSWORD: ${{ inputs.deploy-docker-password != '' && inputs.deploy-docker-password || secrets.deploy-docker-password != '' && secrets.deploy-docker-password }}
          RESOLVED_DEPLOY_DOCKER_IMAGE: ${{ inputs.deploy-docker-image }}
          RESOLVED_PORTAINER_URL: ${{ inputs.portainer-url != '' && inputs.portainer-url || vars.PORTAINER_URL }}
          RESOLVED_PORTAINER_ENDPOINT_ID: ${{ inputs.portainer-endpoint-id != '' && inputs.portainer-endpoint-id || vars.PORTAINER_ENDPOINT_ID }}
          RESOLVED_PORTAINER_API_KEY: ${{ secrets.portainer-api-key != '' && secrets.portainer-api-key }}
        run: |
          set -euo pipefail
          {
            echo "sonar-project-key=${RESOLVED_SONAR_PROJECT_KEY}"
            echo "sonar-project-name=${RESOLVED_SONAR_PROJECT_NAME}"
            echo "sonar-token=${RESOLVED_SONAR_TOKEN}"
            echo "sonar-host-url=${RESOLVED_SONAR_HOST_URL}"
            echo "docker-username=${RESOLVED_DOCKER_USERNAME}"
            echo "docker-password=${RESOLVED_DOCKER_PASSWORD}"
            echo "deploy-host=${RESOLVED_DEPLOY_HOST}"
            echo "deploy-port=${RESOLVED_DEPLOY_PORT}"
            echo "deploy-username=${RESOLVED_DEPLOY_USERNAME}"
            echo "deploy-remote-path=${RESOLVED_DEPLOY_REMOTE_PATH}"
            echo "deploy-ssh-private-key=${RESOLVED_DEPLOY_SSH_PRIVATE_KEY}"
            echo "deploy-docker-username=${RESOLVED_DEPLOY_DOCKER_USERNAME}"
            echo "deploy-docker-password=${RESOLVED_DEPLOY_DOCKER_PASSWORD}"
            echo "deploy-docker-image=${RESOLVED_DEPLOY_DOCKER_IMAGE}"
            echo "portainer-url=${RESOLVED_PORTAINER_URL}"
            echo "portainer-endpoint-id=${RESOLVED_PORTAINER_ENDPOINT_ID}"
            echo "portainer-api-key=${RESOLVED_PORTAINER_API_KEY}"
          } >> "$GITHUB_OUTPUT"

  verify:
    needs: [resolve-contract]
    if: ${{ inputs.run-build || inputs.run-tests || inputs.run-sonar || inputs.upload-artifact }}
    uses: ./.github/workflows/stage-verify.yml
    with:
      language: ${{ inputs.language }}
      language-version: ${{ inputs.language-version }}
      distribution: ${{ inputs.distribution }}
      working-directory: ${{ inputs.working-directory }}
      runner: ${{ inputs.runner }}
      run-build: ${{ inputs.run-build }}
      build-command: ${{ inputs.build-command }}
      run-tests: ${{ inputs.run-tests }}
      run-unit-tests: ${{ inputs.run-unit-tests }}
      unit-test-command: ${{ inputs.unit-test-command }}
      run-integration-tests: ${{ inputs.run-integration-tests }}
      integration-test-command: ${{ inputs.integration-test-command }}
      run-mutation-tests: ${{ inputs.run-mutation-tests }}
      mutation-test-command: ${{ inputs.mutation-test-command }}
      test-command: ${{ inputs.test-command }}
      run-sonar: ${{ inputs.run-sonar }}
      sonar-project-key: ${{ needs.resolve-contract.outputs.sonar-project-key }}
      sonar-project-name: ${{ needs.resolve-contract.outputs.sonar-project-name }}
      sonar-sources: ${{ inputs.sonar-sources }}
      sonar-command: ${{ inputs.sonar-command }}
      enforce-quality-gate: ${{ inputs.enforce-quality-gate }}
      sonar-token: ${{ needs.resolve-contract.outputs.sonar-token }}
      sonar-host-url: ${{ needs.resolve-contract.outputs.sonar-host-url }}
      upload-artifact: ${{ inputs.upload-artifact }}
      artifact-name: ${{ inputs.artifact-name }}
      artifact-path: ${{ inputs.artifact-path }}

  docker:
    needs: [resolve-contract, verify]
    if: ${{ always() && inputs.run-docker-image && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    uses: ./.github/workflows/stage-docker.yml
    with:
      runner: ${{ inputs.runner }}
      registry: ${{ inputs.docker-registry }}
      image-name: ${{ inputs.docker-image-name }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.docker-context }}
      version: ${{ inputs.docker-version }}
      push-latest: ${{ inputs.docker-push-latest }}
      docker-username: ${{ needs.resolve-contract.outputs.docker-username }}
      docker-password: ${{ needs.resolve-contract.outputs.docker-password }}

  deploy-portainer:
    needs: [resolve-contract, verify, docker]
    if: ${{ always() && inputs.run-deploy && inputs.deploy-strategy == 'portainer' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') && (needs.docker.result == 'success' || needs.docker.result == 'skipped') }}
    uses: ./.github/workflows/stage-portainer.yml
    with:
      operation: ${{ inputs.portainer-operation }}
      stack-type: ${{ inputs.portainer-stack-type }}
      stack-id: ${{ inputs.portainer-stack-id }}
      stack-name: ${{ inputs.portainer-stack-name }}
      stack-file-content: ${{ inputs.portainer-stack-file-content }}
      swarm-id: ${{ inputs.portainer-swarm-id }}
      env-json: ${{ inputs.portainer-env-json }}
      prune: ${{ inputs.portainer-prune }}
      repull-image-and-redeploy: ${{ inputs.portainer-repull-image-and-redeploy }}
      prefer-git-redeploy: ${{ inputs.portainer-prefer-git-redeploy }}
      endpoint-id: ${{ needs.resolve-contract.outputs.portainer-endpoint-id }}
      portainer-url: ${{ needs.resolve-contract.outputs.portainer-url }}
      runner: ${{ inputs.runner }}
      portainer-api-key: ${{ needs.resolve-contract.outputs.portainer-api-key }}

  deploy-docker:
    needs: [resolve-contract, verify, docker]
    if: ${{ always() && inputs.run-deploy && inputs.deploy-strategy == 'docker' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') && (needs.docker.result == 'success' || needs.docker.result == 'skipped') }}
    uses: ./.github/workflows/stage-deploy.yml
    with:
      deploy-mode: ${{ inputs.deploy-mode }}
      artifact-name: ${{ inputs.artifact-name }}
      artifact-path: ${{ inputs.artifact-path }}
      host: ${{ needs.resolve-contract.outputs.deploy-host }}
      port: ${{ needs.resolve-contract.outputs.deploy-port }}
      username: ${{ needs.resolve-contract.outputs.deploy-username }}
      remote-path: ${{ needs.resolve-contract.outputs.deploy-remote-path }}
      source-glob: ${{ inputs.deploy-source-glob }}
      strip-components: ${{ inputs.deploy-strip-components }}
      overwrite: ${{ inputs.deploy-overwrite }}
      clean-remote: ${{ inputs.deploy-clean-remote }}
      docker-image: ${{ needs.resolve-contract.outputs.deploy-docker-image != '' && needs.resolve-contract.outputs.deploy-docker-image || needs.docker.outputs.image-version-tag }}
      docker-compose-file: ${{ inputs.deploy-docker-compose-file }}
      docker-run-command: ${{ inputs.deploy-docker-run-command }}
      docker-swarm-service-name: ${{ inputs.deploy-docker-swarm-service-name }}
      docker-swarm-replicas: ${{ inputs.deploy-docker-swarm-replicas }}
      docker-registry: ${{ inputs.deploy-docker-registry }}
      docker-username: ${{ needs.resolve-contract.outputs.deploy-docker-username }}
      docker-password: ${{ needs.resolve-contract.outputs.deploy-docker-password }}
      runner: ${{ inputs.runner }}
      ssh-private-key: ${{ needs.resolve-contract.outputs.deploy-ssh-private-key }}

  deploy-ssh-artifact:
    needs: [resolve-contract, verify]
    if: ${{ always() && inputs.run-deploy && inputs.deploy-strategy == 'ssh-artifact' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    uses: ./.github/workflows/stage-deploy.yml
    with:
      deploy-mode: sftp
      artifact-name: ${{ inputs.artifact-name }}
      artifact-path: ${{ inputs.artifact-path }}
      host: ${{ needs.resolve-contract.outputs.deploy-host }}
      port: ${{ needs.resolve-contract.outputs.deploy-port }}
      username: ${{ needs.resolve-contract.outputs.deploy-username }}
      remote-path: ${{ needs.resolve-contract.outputs.deploy-remote-path }}
      source-glob: ${{ inputs.deploy-source-glob }}
      strip-components: ${{ inputs.deploy-strip-components }}
      overwrite: ${{ inputs.deploy-overwrite }}
      clean-remote: ${{ inputs.deploy-clean-remote }}
      runner: ${{ inputs.runner }}
      ssh-private-key: ${{ needs.resolve-contract.outputs.deploy-ssh-private-key }}

  post-deploy:
    needs: [deploy-portainer, deploy-docker, deploy-ssh-artifact]
    if: ${{ always() && inputs.run-post-deploy-tests && (needs.deploy-portainer.result == 'success' || needs.deploy-docker.result == 'success' || needs.deploy-ssh-artifact.result == 'success') }}
    uses: ./.github/workflows/stage-post-deploy.yml
    with:
      runner: ${{ inputs.runner }}
      run-health-check: ${{ inputs.run-health-check }}
      health-check-url: ${{ inputs.health-check-url }}
      health-check-command: ${{ inputs.health-check-command }}
      health-check-expected-status: ${{ inputs.health-check-expected-status }}
      health-check-retries: ${{ inputs.health-check-retries }}
      health-check-interval-seconds: ${{ inputs.health-check-interval-seconds }}
      run-load-test: ${{ inputs.run-load-test }}
      load-test-command: ${{ inputs.load-test-command }}
      run-contract-test: ${{ inputs.run-contract-test }}
      contract-test-command: ${{ inputs.contract-test-command }}
      working-directory: ${{ inputs.working-directory }}

  rollback:
    needs: [resolve-contract, deploy-portainer, deploy-docker, deploy-ssh-artifact, post-deploy]
    if: ${{ always() && inputs.run-rollback && ((inputs.auto-rollback && needs.post-deploy.result == 'failure') || inputs.manual-rollback) }}
    uses: ./.github/workflows/stage-rollback.yml
    with:
      strategy: ${{ inputs.deploy-strategy }}
      runner: ${{ inputs.runner }}
      host: ${{ needs.resolve-contract.outputs.deploy-host }}
      port: ${{ needs.resolve-contract.outputs.deploy-port }}
      username: ${{ needs.resolve-contract.outputs.deploy-username }}
      ssh-private-key: ${{ needs.resolve-contract.outputs.deploy-ssh-private-key }}
      ssh-rollback-command: ${{ inputs.ssh-rollback-command }}
      docker-mode: ${{ inputs.deploy-mode == 'docker-swarm' && 'swarm' || 'standalone' }}
      docker-swarm-service-name: ${{ inputs.deploy-docker-swarm-service-name }}
      docker-rollback-command: ${{ inputs.docker-rollback-command != '' && inputs.docker-rollback-command || inputs.deploy-docker-run-command }}
      portainer-url: ${{ needs.resolve-contract.outputs.portainer-url }}
      endpoint-id: ${{ needs.resolve-contract.outputs.portainer-endpoint-id }}
      portainer-api-key: ${{ needs.resolve-contract.outputs.portainer-api-key }}
      portainer-stack-id: ${{ inputs.portainer-stack-id }}
      portainer-rollback-to: ${{ inputs.portainer-rollback-to }}
      portainer-prune: ${{ inputs.portainer-prune }}
      portainer-repull-image-and-redeploy: ${{ inputs.portainer-repull-image-and-redeploy }}
