name: OFA-Tech CI/CD

on:
  push:
    branches:
      - $default-branch
  pull_request:
    branches:
      - $default-branch
  workflow_dispatch:

# Store the Docker Hub username as a repository VARIABLE named
# DOCKERHUB_USERNAME (Settings > Secrets and variables > Actions > Variables),
# not as a secret. Secret values are masked, so if the username doubles as the
# image namespace the runner drops every job output containing it.
jobs:
  pipeline:
    # actions: read is required by the resolve-actions-version lookup inside
    # the reusable stages; called workflows can never exceed these grants.
    permissions:
      contents: write
      packages: write
      actions: read
    uses: OFA-Tech/.github/.github/workflows/ci-cd.yml@main
    with:
      gh-runner: self-hosted
      language: node
      language-version: "20"
      language-distribution: ""
      working-directory: "."
      build-command: ""

      run-unit-tests: true
      unit-test-command: ""
      run-integration-tests: false
      integration-test-command: ""

      run-sonar: false
      sonar-enforce-quality-gate: false
      sonar-exclusions: ""

      generate-docker-image: true
      docker-registry: docker.io
      docker-image-namespace: ""
      docker-image-repository: ""
      docker-image-tag: ""
      docker-image-environment: "production"
      dockerfile-path: Dockerfile

      run-deploy: false
      portainer-endpoint-id: ""
      portainer-swarm-id: ""
      portainer-stack-type: swarm
      portainer-stack-name: ""
      portainer-stack-file-content: ""
      portainer-stack-file-path: ""

      run-post-deploy-tests: true
      run-health-check: true
      health-check-url: ""
      health-check-retries: "10"
      rollback-to: ""
    secrets: inherit