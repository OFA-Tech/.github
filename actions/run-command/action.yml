name: Run Command
description: Executes a shell command in an optional working directory.
inputs:
  command:
    description: Command to execute
    required: true
  working-directory:
    description: Working directory for command execution
    required: false
    default: .
runs:
  using: composite
  steps:
    - name: Execute
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        eval "${{ inputs.command }}"
