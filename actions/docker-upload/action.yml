name: Docker Upload
description: Build and push a Docker image with automatic repo-based tags.
inputs:
  registry:
    description: Docker registry host (for example ghcr.io, docker.io)
    required: false
    default: ghcr.io
  image-name:
    description: Optional image name override; defaults to owner/repo name
    required: false
    default: ""
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: Dockerfile
  context:
    description: Docker build context path
    required: false
    default: .
  username:
    description: Registry username
    required: false
    default: ""
  password:
    description: Registry password or token
    required: true
  version:
    description: Optional explicit version tag override
    required: false
    default: ""
  push-latest:
    description: Also push latest tag
    required: false
    default: "true"
outputs:
  image:
    description: Resolved image repository name
    value: ${{ steps.meta.outputs.image }}
  version:
    description: Resolved version tag
    value: ${{ steps.meta.outputs.version }}
  image-version-tag:
    description: Fully-qualified image:version tag
    value: ${{ steps.meta.outputs.image-version-tag }}
  image-latest-tag:
    description: Fully-qualified image:latest tag
    value: ${{ steps.meta.outputs.image-latest-tag }}
runs:
  using: composite
  steps:
    - name: Resolve image metadata
      id: meta
      shell: bash
      run: |
        set -euo pipefail

        registry="${{ inputs.registry }}"
        image_override="${{ inputs.image-name }}"
        version_override="${{ inputs.version }}"

        # Compose default image as <registry>/<owner>/<repo>, lowercased to satisfy registry naming rules.
        default_image="$registry/${GITHUB_REPOSITORY,,}"
        resolved_image="${image_override:-$default_image}"

        if [ -n "$version_override" ]; then
          resolved_version="$version_override"
        else
          stamp="$(date -u +'%Y%m%d%H%M%S')"
          short_sha="${GITHUB_SHA::7}"
          resolved_version="v${stamp}-${short_sha}"
        fi

        image_version_tag="${resolved_image}:${resolved_version}"
        image_latest_tag="${resolved_image}:latest"

        {
          echo "image=$resolved_image"
          echo "version=$resolved_version"
          echo "image-version-tag=$image_version_tag"
          echo "image-latest-tag=$image_latest_tag"
        } >> "$GITHUB_OUTPUT"

    - name: Login to container registry
      shell: bash
      env:
        ORG_DOCKER_USERNAME_SECRET: ${{ env.DOCKER_USERNAME_SECRET }}
        ORG_DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
        FALLBACK_GITHUB_ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail

        resolved_username="${{ inputs.username }}"
        if [ -z "$resolved_username" ]; then
          resolved_username="$ORG_DOCKER_USERNAME_SECRET"
        fi
        if [ -z "$resolved_username" ]; then
          resolved_username="$ORG_DOCKER_USERNAME"
        fi
        if [ -z "$resolved_username" ]; then
          resolved_username="$FALLBACK_GITHUB_ACTOR"
        fi

        echo "${{ inputs.password }}" | docker login "${{ inputs.registry }}" -u "$resolved_username" --password-stdin

    - name: Build Docker image
      shell: bash
      run: |
        set -euo pipefail
        docker build \
          -f "${{ inputs.dockerfile }}" \
          -t "${{ steps.meta.outputs.image-version-tag }}" \
          "${{ inputs.context }}"

    - name: Tag latest
      if: ${{ inputs.push-latest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        docker tag "${{ steps.meta.outputs.image-version-tag }}" "${{ steps.meta.outputs.image-latest-tag }}"

    - name: Push version tag
      shell: bash
      run: |
        set -euo pipefail
        docker push "${{ steps.meta.outputs.image-version-tag }}"

    - name: Push latest tag
      if: ${{ inputs.push-latest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        docker push "${{ steps.meta.outputs.image-latest-tag }}"
