name: Docker Build
description: Build a Docker image with optional advanced build options.
inputs:
  image-tag:
    description: Target image tag (for example ghcr.io/org/app:v1)
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: Dockerfile
  context:
    description: Docker build context path
    required: false
    default: .
  build-args:
    description: Newline-separated build args (KEY=VALUE)
    required: false
    default: ""
  labels:
    description: Newline-separated image labels (KEY=VALUE)
    required: false
    default: ""
  target:
    description: Optional target stage name
    required: false
    default: ""
  pull:
    description: Always attempt to pull newer base images
    required: false
    default: "true"
  no-cache:
    description: Do not use cache when building image
    required: false
    default: "false"
  extra-options:
    description: Raw extra options appended to docker build
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Build image
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        docker_require_cmd docker

        cmd=(docker build -f "${{ inputs.dockerfile }}" -t "${{ inputs.image-tag }}")

        if docker_is_true "${{ inputs.pull }}"; then
          cmd+=(--pull)
        fi

        if docker_is_true "${{ inputs.no-cache }}"; then
          cmd+=(--no-cache)
        fi

        if [ -n "${{ inputs.target }}" ]; then
          cmd+=(--target "${{ inputs.target }}")
        fi

        while IFS= read -r line; do
          if [ -n "$line" ]; then
            cmd+=(--build-arg "$line")
          fi
        done <<< "${{ inputs.build-args }}"

        while IFS= read -r line; do
          if [ -n "$line" ]; then
            cmd+=(--label "$line")
          fi
        done <<< "${{ inputs.labels }}"

        if [ -n "${{ inputs.extra-options }}" ]; then
          cmd_string=""
          printf -v cmd_string '%q ' "${cmd[@]}"
          eval "$cmd_string ${{ inputs.extra-options }} \"${{ inputs.context }}\""
        else
          cmd+=("${{ inputs.context }}")
          "${cmd[@]}"
        fi
