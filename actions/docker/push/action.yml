name: Docker Push
description: Push a Docker image tag to registry.
inputs:
  image-tag:
    description: Image tag to push
    required: true
outputs:
  digest:
    description: First RepoDigest reported locally for pushed image
    value: ${{ steps.push.outputs.digest }}
runs:
  using: composite
  steps:
    - name: Push image
      id: push
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        docker_require_cmd docker

        docker push "${{ inputs.image-tag }}"

        digest="$(docker image inspect "${{ inputs.image-tag }}" --format '{{index .RepoDigests 0}}' 2>/dev/null || true)"
        echo "digest=$digest" >> "$GITHUB_OUTPUT"
