name: Docker Compose
description: Execute docker compose subcommands with optional pull and env file support.
inputs:
  compose-file:
    description: Path to docker-compose file
    required: false
    default: docker-compose.yml
  project-name:
    description: Optional compose project name
    required: false
    default: ""
  env-file:
    description: Optional environment file for compose command
    required: false
    default: ""
  workdir:
    description: Working directory where compose command executes
    required: false
    default: .
  command:
    description: Compose subcommand (up, down, pull, ps, etc.)
    required: false
    default: up
  args:
    description: Raw args appended after compose subcommand
    required: false
    default: -d
  pull-before-up:
    description: Run compose pull before compose up
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Run compose command
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        docker_require_cmd docker

        common=(docker compose -f "${{ inputs.compose-file }}")

        if [ -n "${{ inputs.project-name }}" ]; then
          common+=(--project-name "${{ inputs.project-name }}")
        fi

        if [ -n "${{ inputs.env-file }}" ]; then
          common+=(--env-file "${{ inputs.env-file }}")
        fi

        if docker_is_true "${{ inputs.pull-before-up }}" && [ "${{ inputs.command }}" = "up" ]; then
          pull_cmd=("${common[@]}" pull)
          "${pull_cmd[@]}"
        fi

        run_cmd=("${common[@]}" "${{ inputs.command }}")

        if [ -n "${{ inputs.args }}" ]; then
          cmd_string=""
          printf -v cmd_string '%q ' "${run_cmd[@]}"
          eval "$cmd_string ${{ inputs.args }}"
        else
          "${run_cmd[@]}"
        fi
