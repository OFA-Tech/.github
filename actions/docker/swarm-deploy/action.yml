name: Docker Swarm Deploy
description: Create or update a Docker Swarm service from an image.
inputs:
  service-name:
    description: Swarm service name
    required: true
  image:
    description: Image reference for the service
    required: true
  replicas:
    description: Optional replicas count
    required: false
    default: ""
  with-registry-auth:
    description: Forward registry credentials to swarm nodes
    required: false
    default: "true"
  detach:
    description: Do not block waiting for operation completion
    required: false
    default: "true"
  publish-ports:
    description: Newline-separated published ports (published=80,target=8080)
    required: false
    default: ""
  mounts:
    description: Newline-separated mounts accepted by --mount
    required: false
    default: ""
  env:
    description: Newline-separated environment values (KEY=VALUE)
    required: false
    default: ""
  constraints:
    description: Newline-separated placement constraints
    required: false
    default: ""
  networks:
    description: Newline-separated network names
    required: false
    default: ""
  extra-options:
    description: Raw options appended to create/update command
    required: false
    default: ""
outputs:
  service-name:
    description: Target service name
    value: ${{ steps.deploy.outputs.service-name }}
  operation:
    description: create when service was created, update when service existed
    value: ${{ steps.deploy.outputs.operation }}
runs:
  using: composite
  steps:
    - name: Deploy or update swarm service
      id: deploy
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        common_require_cmd docker
        docker_swarm_require_active

        detach_flag="$(common_bool "${{ inputs.detach }}")"

        # Update uses the -add variants of the list flags and targets the
        # service name; create uses the plain flags and targets the image.
        if docker service inspect "${{ inputs.service-name }}" >/dev/null 2>&1; then
          operation="update"
          flag_suffix="-add"
          target="${{ inputs.service-name }}"
          cmd=(docker service update --image "${{ inputs.image }}" --detach "$detach_flag")
        else
          operation="create"
          flag_suffix=""
          target="${{ inputs.image }}"
          cmd=(docker service create --name "${{ inputs.service-name }}" --detach "$detach_flag")
        fi

        if common_is_true "${{ inputs.with-registry-auth }}"; then
          cmd+=(--with-registry-auth)
        fi

        if [ -n "${{ inputs.replicas }}" ]; then
          cmd+=(--replicas "${{ inputs.replicas }}")
        fi

        docker_append_lines cmd "--publish${flag_suffix}" "${{ inputs.publish-ports }}"
        docker_append_lines cmd "--mount${flag_suffix}" "${{ inputs.mounts }}"
        docker_append_lines cmd "--env${flag_suffix}" "${{ inputs.env }}"
        docker_append_lines cmd "--constraint${flag_suffix}" "${{ inputs.constraints }}"
        docker_append_lines cmd "--network${flag_suffix}" "${{ inputs.networks }}"

        cmd+=("$target")
        docker_exec_with_extra cmd "${{ inputs.extra-options }}"

        {
          echo "service-name=${{ inputs.service-name }}"
          echo "operation=$operation"
        } >> "$GITHUB_OUTPUT"
