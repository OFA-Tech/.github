name: Docker Metadata
description: Resolve Docker image name and tags from repository context.
inputs:
  registry:
    description: Docker registry host (for example ghcr.io, docker.io)
    required: false
    default: docker.io
  account:
    description: Docker account/namespace override
    required: false
    default: ""
  image-name:
    description: Optional full image repository override
    required: false
    default: ""
  docker-image-name:
    description: Docker image repository name override (repository only)
    required: false
    default: ""
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: ""
  version:
    description: Optional explicit image version tag override
    required: false
    default: ""
outputs:
  account:
    description: Resolved docker account/namespace
    value: ${{ steps.meta.outputs.account }}
  image-name:
    description: Resolved docker image repository name
    value: ${{ steps.meta.outputs.image-name }}
  image:
    description: Resolved image repository name
    value: ${{ steps.meta.outputs.image }}
  version:
    description: Resolved version tag
    value: ${{ steps.meta.outputs.version }}
  image-version-tag:
    description: Fully-qualified image:version tag
    value: ${{ steps.meta.outputs.image-version-tag }}
  image-latest-tag:
    description: Fully-qualified image:latest tag
    value: ${{ steps.meta.outputs.image-latest-tag }}
runs:
  using: composite
  steps:
    - name: Resolve image metadata
      id: meta
      shell: bash
      env:
        ORG_DOCKER_ACCOUNT_SECRET: ${{ env.DOCKER_ACCOUNT_SECRET }}
        ORG_DOCKER_IMAGE_NAME_SECRET: ${{ env.DOCKER_IMAGE_NAME_SECRET }}
        ORG_DOCKER_ACCOUNT: ${{ env.DOCKER_ACCOUNT }}
        ORG_DOCKER_IMAGE_NAME: ${{ env.DOCKER_IMAGE_NAME }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        docker_resolve_metadata \
          "${{ inputs.registry }}" \
          "${{ inputs.image-name }}" \
          "${{ inputs.version }}" \
          "${{ inputs.account }}" \
          "${{ inputs.docker-image-name }}" \
          "${{ inputs.environment }}" \
          "" \
          "" \
          "$ORG_DOCKER_ACCOUNT_SECRET" \
          "$ORG_DOCKER_IMAGE_NAME_SECRET" \
          "$ORG_DOCKER_ACCOUNT" \
          "$ORG_DOCKER_IMAGE_NAME"
