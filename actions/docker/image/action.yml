name: Docker Image Upload
description: Resolve metadata, build Docker image and push version/latest tags.
inputs:
  registry:
    description: Docker registry host (for example ghcr.io, docker.io)
    required: false
    default: docker.io
  account:
    description: Docker account/namespace override
    required: false
    default: ""
  image-name:
    description: Optional full image repository override (for example account/repository)
    required: false
    default: ""
  docker-image-name:
    description: Docker image repository name override (repository only, no account)
    required: false
    default: ""
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: ""
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: Dockerfile
  context:
    description: Docker build context path
    required: false
    default: .
  username:
    description: Registry username override
    required: false
    default: ""
  password:
    description: Registry password or token
    required: true
  version:
    description: Optional explicit version tag override
    required: false
    default: ""
  push-latest:
    description: Also push latest tag
    required: false
    default: "true"
  build-args:
    description: Newline-separated build args (KEY=VALUE)
    required: false
    default: ""
  labels:
    description: Newline-separated image labels (KEY=VALUE)
    required: false
    default: ""
  target:
    description: Optional target stage name
    required: false
    default: ""
  pull:
    description: Always attempt to pull newer base images
    required: false
    default: "true"
  no-cache:
    description: Do not use cache when building image
    required: false
    default: "false"
outputs:
  account:
    description: Resolved docker account/namespace
    value: ${{ steps.meta.outputs.account }}
  image-name:
    description: Resolved docker image repository name
    value: ${{ steps.meta.outputs.image-name }}
  image:
    description: Resolved image repository name
    value: ${{ steps.meta.outputs.image }}
  version:
    description: Resolved version tag
    value: ${{ steps.meta.outputs.version }}
  image-version-tag:
    description: Fully-qualified image:version tag
    value: ${{ steps.meta.outputs.image-version-tag }}
  image-latest-tag:
    description: Fully-qualified image:latest tag
    value: ${{ steps.meta.outputs.image-latest-tag }}
runs:
  using: composite
  steps:
    - name: Resolve metadata
      id: meta
      shell: bash
      env:
        ORG_DOCKER_ACCOUNT_SECRET: ${{ env.DOCKER_ACCOUNT_SECRET }}
        ORG_DOCKER_IMAGE_NAME_SECRET: ${{ env.DOCKER_IMAGE_NAME_SECRET }}
        ORG_DOCKER_ACCOUNT: ${{ env.DOCKER_ACCOUNT }}
        ORG_DOCKER_IMAGE_NAME: ${{ env.DOCKER_IMAGE_NAME }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        docker_resolve_metadata \
          "${{ inputs.registry }}" \
          "${{ inputs.image-name }}" \
          "${{ inputs.version }}" \
          "${{ inputs.account }}" \
          "${{ inputs.docker-image-name }}" \
          "${{ inputs.environment }}" \
          "${{ inputs.username }}" \
          "${{ inputs.password }}" \
          "$ORG_DOCKER_ACCOUNT_SECRET" \
          "$ORG_DOCKER_IMAGE_NAME_SECRET" \
          "$ORG_DOCKER_ACCOUNT" \
          "$ORG_DOCKER_IMAGE_NAME"

    - name: Login to registry
      shell: bash
      env:
        ORG_DOCKER_USERNAME_SECRET: ${{ env.DOCKER_USERNAME_SECRET }}
        ORG_DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        docker_require_cmd docker

        resolved_username="$(docker_resolve_username "${{ inputs.username }}" "$ORG_DOCKER_USERNAME_SECRET" "$ORG_DOCKER_USERNAME" "")"
        if [ -z "$resolved_username" ]; then
          echo "Missing Docker Hub username. Provide docker username via input, secret, or DOCKER_USERNAME variable." >&2
          exit 1
        fi

        if [ -z "${{ inputs.password }}" ]; then
          echo "Missing Docker Hub token/password. Provide docker token via input or secret." >&2
          exit 1
        fi

        if [ "${{ inputs.registry }}" = "docker.io" ] && [ "${{ steps.meta.outputs.account }}" != "$resolved_username" ]; then
          echo "Docker login user '$resolved_username' differs from target account '${{ steps.meta.outputs.account }}'. Ensure this user can push to ${{ steps.meta.outputs.image }}." >&2
        fi

        docker_login "${{ inputs.registry }}" "$resolved_username" "${{ inputs.password }}"

        if [ "${{ inputs.registry }}" = "docker.io" ]; then
          docker_verify_hub_repository_access "${{ steps.meta.outputs.account }}" "${{ steps.meta.outputs.image-name }}" "$resolved_username" "${{ inputs.password }}"
        fi

    - name: Build docker image
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        docker_require_cmd docker

        cmd=(docker build -f "${{ inputs.dockerfile }}" -t "${{ steps.meta.outputs.image-version-tag }}")

        if docker_is_true "${{ inputs.pull }}"; then
          cmd+=(--pull)
        fi

        if docker_is_true "${{ inputs.no-cache }}"; then
          cmd+=(--no-cache)
        fi

        if [ -n "${{ inputs.target }}" ]; then
          cmd+=(--target "${{ inputs.target }}")
        fi

        while IFS= read -r line; do
          if [ -n "$line" ]; then
            cmd+=(--build-arg "$line")
          fi
        done <<< "${{ inputs.build-args }}"

        while IFS= read -r line; do
          if [ -n "$line" ]; then
            cmd+=(--label "$line")
          fi
        done <<< "${{ inputs.labels }}"

        cmd+=("${{ inputs.context }}")
        "${cmd[@]}"

    - name: Tag latest
      if: ${{ inputs.push-latest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        docker tag "${{ steps.meta.outputs.image-version-tag }}" "${{ steps.meta.outputs.image-latest-tag }}"

    - name: Push version
      shell: bash
      run: |
        set -euo pipefail
        docker push "${{ steps.meta.outputs.image-version-tag }}"

    - name: Push latest
      if: ${{ inputs.push-latest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        docker push "${{ steps.meta.outputs.image-latest-tag }}"
