name: Docker Image Upload
description: Resolve metadata, build Docker image and push version/latest tags.
inputs:
  registry:
    description: Docker registry host (for example ghcr.io, docker.io)
    required: false
    default: docker.io
  namespace:
    description: Optional explicit namespace override
    required: false
    default: ""
  repository:
    description: Optional explicit repository override
    required: false
    default: ""
  tag:
    description: Optional explicit version tag override
    required: false
    default: ""
  labels:
    description: Newline-separated image labels (KEY=VALUE)
    required: false
    default: ""
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: "production"
  dockerfile-path:
    description: Path to Dockerfile
    required: false
    default: Dockerfile
  working-directory:
    description: Docker build context path
    required: false
    default: .
  username:
    description: Optional explicit registry username override
    required: false
    default: ""
  token:
    description: Optional explicit registry token override
    required: false
    default: ""
  push-latest:
    description: Also push latest tag
    required: false
    default: "true"
  build-args:
    description: Newline-separated build args (KEY=VALUE)
    required: false
    default: ""
  build-no-cache:
    description: Do not use cache when building image
    required: false
    default: "true"
outputs:
  full-image-name:
    description: Full resolved image name with registry, account, repository, and version
    value: ${{ steps.meta.outputs['image-version-tag'] }}
  image-registry:
    description: Resolved docker registry
    value: ${{ steps.meta.outputs.registry }}
  image-namespace:
    description: Resolved docker account/namespace
    value: ${{ steps.meta.outputs.account }}
  image-repository:
    description: Resolved docker image
    value: ${{ steps.meta.outputs['image-name'] }}
  image-tag:
    description: Resolved docker image version tag
    value: ${{ steps.meta.outputs.version }}
  image:
    description: Resolved docker image repository path without tag
    value: ${{ steps.meta.outputs.image }}
  version:
    description: Resolved docker image version tag value
    value: ${{ steps.meta.outputs.version }}
  image-version-tag:
    description: Resolved docker image with version tag
    value: ${{ steps.meta.outputs['image-version-tag'] }}
  image-latest-tag:
    description: Resolved docker image latest tag
    value: ${{ steps.meta.outputs['image-latest-tag'] }}
runs:
  using: composite
  steps:
    # The metadata bundle runs via `run: node` because composite steps cannot
    # reference the sibling actions/docker/metadata action by relative path.
    # Self-hosted runners may not have node on PATH, so install it explicitly
    # (no-op when already provisioned; cached in the runner tool cache).
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24

    # Metadata resolution (account/repository fallbacks, branch-based version
    # bumping, collision checks) lives in TypeScript — the same bundle behind
    # actions/docker/metadata. Only the docker CLI steps below stay in shell.
    - name: Resolve metadata
      id: meta
      shell: bash
      env:
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_NAMESPACE: ${{ inputs.namespace }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_USERNAME: ${{ inputs.username }}
        INPUT_TOKEN: ${{ inputs.token }}
      run: node "$GITHUB_ACTION_PATH/../../../dist/docker-metadata/index.js"

    - name: Login to registry
      shell: bash
      env:
        ORG_DOCKER_USERNAME_SECRET: ${{ env.DOCKER_USERNAME_SECRET }}
        ORG_DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        common_require_cmd docker

        resolved_username="$(docker_resolve_username "${{ inputs.username }}" "$ORG_DOCKER_USERNAME_SECRET" "$ORG_DOCKER_USERNAME" "")"
        if [ -z "$resolved_username" ]; then
          echo "Missing Docker Hub username. Provide docker username via input, secret, or DOCKER_USERNAME variable." >&2
          exit 1
        fi

        if [ -z "${{ inputs.token }}" ]; then
          echo "Missing Docker Hub token. Provide docker token via input or secret." >&2
          exit 1
        fi

        if [ "${{ inputs.registry }}" = "docker.io" ] && [ "${{ steps.meta.outputs.account }}" != "$resolved_username" ]; then
          echo "Docker login user '$resolved_username' differs from target account '${{ steps.meta.outputs.account }}'. Ensure this user can push to ${{ steps.meta.outputs.image }}." >&2
        fi

        docker_login "${{ inputs.registry }}" "$resolved_username" "${{ inputs.token }}"

        if [ "${{ inputs.registry }}" = "docker.io" ]; then
          docker_verify_hub_repository_access "${{ steps.meta.outputs.account }}" "${{ steps.meta.outputs.image-name }}" "$resolved_username" "${{ inputs.token }}"
        fi

    - name: Build docker image
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/docker/common.sh"
        common_require_cmd docker

        cmd=(docker build -f "${{ inputs.dockerfile-path }}" -t "${{ steps.meta.outputs.image-version-tag }}")

        if common_is_true "${{ inputs.build-no-cache }}"; then
          cmd+=(--no-cache)
        fi

        docker_append_lines cmd --build-arg "${{ inputs.build-args }}"
        docker_append_lines cmd --label "${{ inputs.labels }}"

        cmd+=("${{ inputs.working-directory }}")
        "${cmd[@]}"

    - name: Tag latest
      if: ${{ inputs.push-latest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        docker tag "${{ steps.meta.outputs.image-version-tag }}" "${{ steps.meta.outputs.image-latest-tag }}"

    - name: Push version
      shell: bash
      run: |
        set -euo pipefail
        docker push "${{ steps.meta.outputs.image-version-tag }}"

    - name: Push latest
      if: ${{ inputs.push-latest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        docker push "${{ steps.meta.outputs.image-latest-tag }}"
