name: Docker Upload
description: Backward-compatible wrapper around the Docker image action.
inputs:
  registry:
    description: Docker registry host
    required: false
    default: docker.io
  account:
    description: Docker account/namespace override
    required: false
    default: ""
  image-name:
    description: Optional full image repository override
    required: false
    default: ""
  docker-image-name:
    description: Docker image repository name override (repository only)
    required: false
    default: ""
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: ""
  dockerfile:
    description: Dockerfile path
    required: false
    default: Dockerfile
  context:
    description: Docker build context path
    required: false
    default: .
  username:
    description: Registry username override
    required: false
    default: ""
  password:
    description: Registry password or token
    required: true
  version:
    description: Optional explicit version tag override
    required: false
    default: ""
  push-latest:
    description: Also push latest tag
    required: false
    default: "true"
outputs:
  account:
    description: Resolved docker account/namespace
    value: ${{ steps.image.outputs.account }}
  image-name:
    description: Resolved docker image repository name
    value: ${{ steps.image.outputs.image-name }}
  image:
    description: Resolved image repository name
    value: ${{ steps.image.outputs.image }}
  version:
    description: Resolved version tag
    value: ${{ steps.image.outputs.version }}
  image-version-tag:
    description: Fully-qualified image:version tag
    value: ${{ steps.image.outputs.image-version-tag }}
  image-latest-tag:
    description: Fully-qualified image:latest tag
    value: ${{ steps.image.outputs.image-latest-tag }}
runs:
  using: composite
  steps:
    - name: Build and push image
      id: image
      uses: ./actions/docker/image
      with:
        registry: ${{ inputs.registry }}
        account: ${{ inputs.account }}
        image-name: ${{ inputs.image-name }}
        docker-image-name: ${{ inputs.docker-image-name }}
        environment: ${{ inputs.environment }}
        dockerfile: ${{ inputs.dockerfile }}
        context: ${{ inputs.context }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
        version: ${{ inputs.version }}
        push-latest: ${{ inputs.push-latest }}
