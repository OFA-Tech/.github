name: Portainer Stack Rollback
description: Roll back a Docker standalone or swarm stack via the Portainer API.

inputs:
  portainer-url:
    description: Portainer base URL, for example https://portainer.example.com
    required: true
  api-key:
    description: Portainer API key
    required: true
  endpoint-id:
    description: Portainer environment/endpoint ID
    required: true
  stack-id:
    description: Stack ID to rollback
    required: true
  rollback-to:
    description: Target stack file version. If empty, the action uses current version minus one.
    required: false
    default: ""
  prune:
    description: Prune services not referenced anymore (mainly swarm)
    required: false
    default: "false"
  repull-image-and-redeploy:
    description: Force image repull and redeploy while rolling back
    required: false
    default: "true"

outputs:
  stack-id:
    description: Rolled back stack ID
    value: ${{ steps.run.outputs.stack-id }}
  rollback-to:
    description: Version used for rollback
    value: ${{ steps.run.outputs.rollback-to }}

runs:
  using: composite
  steps:
    - id: run
      name: Execute Portainer rollback
      shell: bash
      run: |
        set -euo pipefail

        PORTAINER_URL="${{ inputs.portainer-url }}"
        PORTAINER_URL="${PORTAINER_URL%/}"
        API_KEY="${{ inputs.api-key }}"
        ENDPOINT_ID="${{ inputs.endpoint-id }}"
        STACK_ID="${{ inputs.stack-id }}"
        ROLLBACK_TO="${{ inputs.rollback-to }}"
        PRUNE="${{ inputs.prune }}"
        REPULL="${{ inputs.repull-image-and-redeploy }}"

        fail() {
          echo "$1" >&2
          exit 1
        }

        require_cmd() {
          command -v "$1" >/dev/null 2>&1 || fail "Missing required command: $1"
        }

        is_true() {
          case "${1:-}" in
            true|TRUE|1|yes|YES|on|ON) return 0 ;;
            *) return 1 ;;
          esac
        }

        api() {
          local method="$1"
          local url="$2"
          local body="${3:-}"

          if [[ -n "$body" ]]; then
            curl -fsSL -X "$method" \
              -H "X-API-Key: ${API_KEY}" \
              -H "Content-Type: application/json" \
              --data "$body" \
              "$url"
          else
            curl -fsSL -X "$method" \
              -H "X-API-Key: ${API_KEY}" \
              -H "Content-Type: application/json" \
              "$url"
          fi
        }

        require_cmd curl
        require_cmd jq

        STACK_JSON="$(api GET "${PORTAINER_URL}/api/stacks/${STACK_ID}" "")"

        if [[ -z "$ROLLBACK_TO" ]]; then
          CURRENT_VERSION="$(jq -r '.Version // empty' <<<"$STACK_JSON")"
          if [[ -z "$CURRENT_VERSION" || "$CURRENT_VERSION" == "null" ]]; then
            fail "rollback-to is required when stack version is not available in stack inspect response"
          fi

          if ! [[ "$CURRENT_VERSION" =~ ^[0-9]+$ ]]; then
            fail "Invalid current stack version: ${CURRENT_VERSION}"
          fi

          if (( CURRENT_VERSION < 2 )); then
            fail "Stack version ${CURRENT_VERSION} has no previous version to rollback to"
          fi

          ROLLBACK_TO="$((CURRENT_VERSION - 1))"
        fi

        if ! [[ "$ROLLBACK_TO" =~ ^[0-9]+$ ]]; then
          fail "rollback-to must be a positive integer"
        fi

        PAYLOAD="$(jq -cn \
          --argjson rollbackTo "$ROLLBACK_TO" \
          --argjson prune "$(is_true "$PRUNE" && echo true || echo false)" \
          --argjson repull "$(is_true "$REPULL" && echo true || echo false)" \
          '{RollbackTo:$rollbackTo, Prune:$prune, RepullImageAndRedeploy:$repull}')"

        api PUT "${PORTAINER_URL}/api/stacks/${STACK_ID}?endpointId=${ENDPOINT_ID}" "$PAYLOAD" >/dev/null

        {
          echo "stack-id=${STACK_ID}"
          echo "rollback-to=${ROLLBACK_TO}"
        } >> "$GITHUB_OUTPUT"
