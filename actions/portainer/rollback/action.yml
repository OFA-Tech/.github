name: Portainer Stack Rollback
description: Roll back a Docker standalone or swarm stack via the Portainer API.

inputs:
  portainer-url:
    description: Portainer base URL, for example https://portainer.example.com
    required: true
  api-key:
    description: Portainer API key
    required: true
  endpoint-id:
    description: Portainer environment/endpoint ID
    required: true
  stack-name:
    description: Stack name to rollback
    required: true
  rollback-to:
    description: Target stack file version. If empty, the action uses current version minus one.
    required: false
    default: ""
  prune:
    description: Prune services not referenced anymore (mainly swarm)
    required: false
    default: "false"
  repull-image-and-redeploy:
    description: Force image repull and redeploy while rolling back
    required: false
    default: "true"

outputs:
  stack-id:
    description: Rolled back stack ID
  rollback-to:
    description: Version used for rollback

# Rollback logic (stack lookup, target version math, API error handling)
# lives in TypeScript. See the entrypoint at
# src/application/portainer/actions/rollback-action.ts and the
# RollbackStackUseCase in src/application/portainer/use-cases. The bundle is
# committed under dist/.
runs:
  using: node24
  main: ../../../dist/portainer-rollback/index.js
