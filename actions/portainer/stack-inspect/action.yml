name: Portainer Stack Inspect
description: Inspect a stack and expose key metadata/JSON for downstream workflow steps.

inputs:
  portainer-url:
    description: Portainer base URL, for example https://portainer.example.com
    required: true
  api-key:
    description: Portainer API key
    required: true
  stack-id:
    description: Stack ID to inspect
    required: true

outputs:
  stack-id:
    description: Stack ID
    value: ${{ steps.run.outputs.stack-id }}
  stack-name:
    description: Stack name
    value: ${{ steps.run.outputs.stack-name }}
  endpoint-id:
    description: Endpoint ID associated with the stack
    value: ${{ steps.run.outputs.endpoint-id }}
  stack-type-resolved:
    description: swarm | standalone | unknown
    value: ${{ steps.run.outputs.stack-type-resolved }}
  stack-json:
    description: Full stack JSON (single-line)
    value: ${{ steps.run.outputs.stack-json }}

runs:
  using: composite
  steps:
    - id: run
      name: Inspect stack
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/portainer/common.sh"

        PORTAINER_URL="$(portainer_normalize_url "${{ inputs.portainer-url }}")"
        API_KEY="${{ inputs.api-key }}"
        STACK_ID="${{ inputs.stack-id }}"

        common_require_cmd curl
        common_require_cmd jq

        STACK_JSON="$(portainer_api_get "$PORTAINER_URL" "$API_KEY" "/api/stacks/${STACK_ID}")"

        OUT_ID="$(jq -r '.Id // .ID // empty' <<<"$STACK_JSON")"
        OUT_NAME="$(jq -r '.Name // empty' <<<"$STACK_JSON")"
        OUT_ENDPOINT_ID="$(jq -r '.EndpointId // .EndpointID // empty' <<<"$STACK_JSON")"
        OUT_TYPE="$(portainer_resolve_stack_type "$STACK_JSON")"
        OUT_JSON_SINGLE_LINE="$(jq -c '.' <<<"$STACK_JSON")"

        {
          echo "stack-id=${OUT_ID}"
          echo "stack-name=${OUT_NAME}"
          echo "endpoint-id=${OUT_ENDPOINT_ID}"
          echo "stack-type-resolved=${OUT_TYPE}"
          echo "stack-json=${OUT_JSON_SINGLE_LINE}"
        } >> "$GITHUB_OUTPUT"
