name: Portainer Stack Deploy/Update
description: Deploy a new Docker stack from text or update/redeploy an existing stack via the Portainer API.

inputs:
  portainer-url:
    description: Portainer base URL, for example https://portainer.example.com
    required: true
  api-key:
    description: Portainer API key
    required: true
  endpoint-id:
    description: Portainer environment/endpoint ID
    required: true
  stack-type:
    description: Stack runtime type (swarm or standalone)
    required: true
  operation:
    description: deploy or update
    required: false
    default: deploy
  stack-id:
    description: Existing stack ID for update
    required: false
    default: ""
  stack-name:
    description: Stack name for deploy
    required: false
    default: ""
  stack-file-content:
    description: Stack/compose content as plain text
    required: false
    default: ""
  stack-file-path:
    description: Path to a stack/compose file in the repository workspace
    required: false
    default: ""
  swarm-id:
    description: Swarm cluster ID (required for swarm deploy)
    required: false
    default: ""
  env-json:
    description: Optional JSON array of env vars for Portainer stack environment, for example [{"name":"A","value":"B"}]
    required: false
    default: ""
  prune:
    description: Prune services not referenced anymore (mainly swarm)
    required: false
    default: "false"
  repull-image-and-redeploy:
    description: Force image repull and redeploy on update/redeploy
    required: false
    default: "true"
  prefer-git-redeploy:
    description: For update, prefer /stacks/{id}/git/redeploy when stack has Git config
    required: false
    default: "true"

outputs:
  stack-id:
    description: Created or updated stack ID
  operation:
    description: Operation executed (deploy|update)

# Orchestration logic (deploy/update branching, git-redeploy detection, API
# error handling and retries) lives in TypeScript. See the entrypoint at
# src/application/portainer/actions/deploy-action.ts and the Portainer
# application area (domain entities/models/interfaces + the API repository
# under src/infrastructure/data). The bundle is committed under dist/.
runs:
  using: node20
  main: ../../../dist/portainer-deploy/index.js
