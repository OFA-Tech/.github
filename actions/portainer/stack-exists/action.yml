name: Portainer Stack Exists
description: Check if a stack exists by stack ID or by stack name in a specific endpoint.

inputs:
  portainer-url:
    description: Portainer base URL, for example https://portainer.example.com
    required: true
  api-key:
    description: Portainer API key
    required: true
  endpoint-id:
    description: Portainer endpoint ID used for name-based lookups
    required: false
    default: ""
  stack-id:
    description: Optional stack ID to check directly
    required: false
    default: ""
  stack-name:
    description: Optional stack name to check
    required: false
    default: ""
  stack-type:
    description: Optional expected type (swarm or standalone)
    required: false
    default: ""
  fail-if-missing:
    description: Fail the action when no matching stack is found
    required: false
    default: "false"

outputs:
  exists:
    description: true when a matching stack is found
  stack-id:
    description: Matching stack ID when found
  stack-name:
    description: Matching stack name when found
  stack-type-resolved:
    description: swarm | standalone | unknown

# Lookup and stack-type resolution logic lives in TypeScript. See the
# entrypoint at src/application/portainer/actions/stack-exists-action.ts and
# the Portainer API repository under src/infrastructure/data/api-repositories.
# The bundle is committed under dist/.
runs:
  using: node20
  main: ../../../dist/portainer-stack-exists/index.js
