name: Portainer Stack File
description: Retrieve a stack file content (latest or a specific version).

inputs:
  portainer-url:
    description: Portainer base URL, for example https://portainer.example.com
    required: true
  api-key:
    description: Portainer API key
    required: true
  stack-id:
    description: Stack ID
    required: true
  version:
    description: Optional stack file version
    required: false
    default: ""

outputs:
  stack-file-content:
    description: Stack file content
    value: ${{ steps.run.outputs.stack-file-content }}
  requested-version:
    description: Version value used for request (empty means latest)
    value: ${{ steps.run.outputs.requested-version }}

runs:
  using: composite
  steps:
    - id: run
      name: Get stack file
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../../scripts/portainer/common.sh"

        PORTAINER_URL="$(portainer_normalize_url "${{ inputs.portainer-url }}")"
        API_KEY="${{ inputs.api-key }}"
        STACK_ID="${{ inputs.stack-id }}"
        VERSION="${{ inputs.version }}"

        common_require_cmd curl
        common_require_cmd jq

        FILE_PATH="/api/stacks/${STACK_ID}/file"
        if [[ -n "$VERSION" ]]; then
          FILE_PATH="${FILE_PATH}?version=${VERSION}"
        fi

        FILE_JSON="$(portainer_api_get "$PORTAINER_URL" "$API_KEY" "$FILE_PATH")"
        STACK_FILE_CONTENT="$(jq -r '.StackFileContent // empty' <<<"$FILE_JSON")"

        if [[ -z "$STACK_FILE_CONTENT" ]]; then
          common_fail "Stack file content is empty or missing in response"
        fi

        {
          echo "requested-version=${VERSION}"
          echo "stack-file-content<<EOF"
          echo "$STACK_FILE_CONTENT"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
