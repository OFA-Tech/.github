name: Portainer Service
description: Deploy, rollback, or scale a Docker Swarm service through the Portainer API.

inputs:
  portainer-url:
    description: Portainer base URL, for example https://hub-ofatech.ddns.net/portainer
    required: true
  api-key:
    description: Portainer API key
    required: true
  endpoint-id:
    description: Portainer environment/endpoint ID
    required: true
  operation:
    description: deploy | rollback | scale
    required: true
  service:
    description: Docker Swarm service name or ID
    required: true
  image:
    description: Full image reference for deploy, for example ghcr.io/ofa-tech/app:1.2.3
    required: false
    default: ""
  replicas:
    description: Replica count for scale
    required: false
    default: ""
  force-update:
    description: Increment ForceUpdate during deploy
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Run Portainer service operation
      shell: bash
      run: |
        set -euo pipefail

        PORTAINER_URL="${{ inputs.portainer-url }}"
        PORTAINER_URL="${PORTAINER_URL%/}"
        API_KEY="${{ inputs.api-key }}"
        ENDPOINT_ID="${{ inputs.endpoint-id }}"
        OPERATION="${{ inputs.operation }}"
        SERVICE="${{ inputs.service }}"
        IMAGE="${{ inputs.image }}"
        REPLICAS="${{ inputs.replicas }}"
        FORCE_UPDATE="${{ inputs.force-update }}"

        auth_header=(-H "X-API-Key: ${API_KEY}")
        json_header=(-H "Content-Type: application/json")

        fail() {
          echo "$1" >&2
          exit 1
        }

        require_cmd() {
          command -v "$1" >/dev/null 2>&1 || fail "Missing required command: $1"
        }

        require_cmd curl
        require_cmd jq

        case "${OPERATION}" in
          deploy|rollback|scale) ;;
          *) fail "Unsupported operation: ${OPERATION}. Use deploy, rollback, or scale." ;;
        esac

        if [[ "${OPERATION}" == "deploy" && -z "${IMAGE}" ]]; then
          fail "image is required for deploy"
        fi

        if [[ "${OPERATION}" == "scale" && -z "${REPLICAS}" ]]; then
          fail "replicas is required for scale"
        fi

        echo "Fetching current service spec for ${SERVICE}..."
        SERVICE_JSON="$(curl -fsSL \
          "${auth_header[@]}" \
          "${PORTAINER_URL}/api/endpoints/${ENDPOINT_ID}/docker/services/${SERVICE}")"

        VERSION_INDEX="$(jq -r '.Version.Index' <<<"${SERVICE_JSON}")"
        SPEC_JSON="$(jq -c '.Spec' <<<"${SERVICE_JSON}")"

        if [[ -z "${VERSION_INDEX}" || "${VERSION_INDEX}" == "null" ]]; then
          fail "Could not resolve service version index for ${SERVICE}"
        fi

        case "${OPERATION}" in
          deploy)
            UPDATED_SPEC="$(jq -c \
              --arg image "${IMAGE}" \
              --arg force_update "${FORCE_UPDATE}" '
              .TaskTemplate.ContainerSpec.Image = $image
              | if ($force_update == "true")
                then .TaskTemplate.ForceUpdate = ((.TaskTemplate.ForceUpdate // 0) + 1)
                else .
                end
            ' <<<"${SPEC_JSON}")"

            echo "Deploying image ${IMAGE} to service ${SERVICE}..."
            curl -fsSL -X POST \
              "${auth_header[@]}" \
              "${json_header[@]}" \
              --data "${UPDATED_SPEC}" \
              "${PORTAINER_URL}/api/endpoints/${ENDPOINT_ID}/docker/services/${SERVICE}/update?version=${VERSION_INDEX}" \
              >/dev/null
            ;;
          rollback)
            echo "Rolling back service ${SERVICE} to previous version..."
            curl -fsSL -X POST \
              "${auth_header[@]}" \
              "${json_header[@]}" \
              --data "${SPEC_JSON}" \
              "${PORTAINER_URL}/api/endpoints/${ENDPOINT_ID}/docker/services/${SERVICE}/update?version=${VERSION_INDEX}&rollback=previous" \
              >/dev/null
            ;;
          scale)
            if ! jq -e '.Mode.Replicated' <<<"${SPEC_JSON}" >/dev/null; then
              fail "Service ${SERVICE} is not in replicated mode, so it cannot be scaled this way"
            fi

            UPDATED_SPEC="$(jq -c \
              --argjson replicas "${REPLICAS}" \
              '.Mode.Replicated.Replicas = $replicas
            ' <<<"${SPEC_JSON}")"

            echo "Scaling service ${SERVICE} to ${REPLICAS} replicas..."
            curl -fsSL -X POST \
              "${auth_header[@]}" \
              "${json_header[@]}" \
              --data "${UPDATED_SPEC}" \
              "${PORTAINER_URL}/api/endpoints/${ENDPOINT_ID}/docker/services/${SERVICE}/update?version=${VERSION_INDEX}" \
              >/dev/null
            ;;
        esac

        echo "Waiting for service state..."
        sleep 5

        curl -fsSL \
          "${auth_header[@]}" \
          "${PORTAINER_URL}/api/endpoints/${ENDPOINT_ID}/docker/services/${SERVICE}" \
          | jq '{ID, Spec, UpdateStatus, Endpoint}'