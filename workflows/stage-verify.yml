name: Stage - Verify

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      language-version:
        required: false
        type: string
        default: ""
      distribution:
        required: false
        type: string
        default: ""
      working-directory:
        required: false
        type: string
        default: .
      runner:
        required: false
        type: string
        default: ubuntu-latest
      run-build:
        required: false
        type: boolean
        default: true
      build-command:
        required: false
        type: string
        default: ""
      run-tests:
        required: false
        type: boolean
        default: true
      run-unit-tests:
        required: false
        type: boolean
        default: true
      unit-test-command:
        required: false
        type: string
        default: ""
      run-integration-tests:
        required: false
        type: boolean
        default: false
      integration-test-command:
        required: false
        type: string
        default: ""
      run-mutation-tests:
        required: false
        type: boolean
        default: false
      mutation-test-command:
        required: false
        type: string
        default: ""
      test-command:
        required: false
        type: string
        default: ""
      run-sonar:
        required: false
        type: boolean
        default: false
      sonar-project-key:
        required: false
        type: string
        default: ""
      sonar-project-name:
        required: false
        type: string
        default: ""
      sonar-sources:
        required: false
        type: string
        default: .
      sonar-command:
        required: false
        type: string
        default: ""
      enforce-quality-gate:
        required: false
        type: boolean
        default: false
      sonar-token:
        required: false
        type: string
        default: ""
      sonar-host-url:
        required: false
        type: string
        default: ""
      upload-artifact:
        required: false
        type: boolean
        default: false
      artifact-name:
        required: false
        type: string
        default: build-output
      artifact-path:
        required: false
        type: string
        default: .

jobs:
  verify:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve language defaults
        id: defaults
        uses: ./actions/setup/resolve
        with:
          language: ${{ inputs.language }}
          version: ${{ inputs.language-version }}
          distribution: ${{ inputs.distribution }}
          build-command: ${{ inputs.build-command }}
          test-command: ${{ inputs.test-command }}

      - name: Setup runtime
        uses: ./actions/setup/runtime
        with:
          language: ${{ steps.defaults.outputs.language }}
          version: ${{ steps.defaults.outputs.version }}
          distribution: ${{ steps.defaults.outputs.distribution }}

      - name: Build
        if: ${{ inputs.run-build && steps.defaults.outputs.build-command != '' }}
        uses: ./actions/run-command
        with:
          command: ${{ steps.defaults.outputs.build-command }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run unit tests
        if: ${{ inputs.run-tests && inputs.run-unit-tests && (inputs.unit-test-command != '' || steps.defaults.outputs.test-command != '') }}
        uses: ./actions/run-command
        with:
          command: ${{ inputs.unit-test-command != '' && inputs.unit-test-command || steps.defaults.outputs.test-command }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run integration tests
        if: ${{ inputs.run-tests && inputs.run-integration-tests && inputs.integration-test-command != '' }}
        uses: ./actions/run-command
        with:
          command: ${{ inputs.integration-test-command }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run mutation tests
        if: ${{ inputs.run-tests && inputs.run-mutation-tests && inputs.mutation-test-command != '' }}
        uses: ./actions/run-command
        with:
          command: ${{ inputs.mutation-test-command }}
          working-directory: ${{ inputs.working-directory }}

      - name: Validate Sonar configuration
        if: ${{ inputs.run-sonar && (inputs.sonar-token == '' || inputs.sonar-host-url == '' || inputs.sonar-project-key == '') }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Missing Sonar configuration. Ensure token, host URL and project key were resolved in workflow-templates/ci-cd.yml." >&2
          exit 1

      - name: Run custom Sonar command
        if: ${{ inputs.run-sonar && inputs.sonar-command != '' }}
        uses: ./actions/run-command
        with:
          command: ${{ inputs.sonar-command }}
          working-directory: ${{ inputs.working-directory }}
        env:
          SONAR_TOKEN: ${{ inputs.sonar-token }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}

      - name: Run Sonar scan action
        if: ${{ inputs.run-sonar && inputs.sonar-command == '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ inputs.sonar-token }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >-
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.projectName=${{ inputs.sonar-project-name }}
            -Dsonar.sources=${{ inputs.sonar-sources }}

      - name: Enforce quality gate
        if: ${{ inputs.run-sonar && inputs.enforce-quality-gate && inputs.sonar-command == '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ inputs.sonar-token }}

      - name: Upload build artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
