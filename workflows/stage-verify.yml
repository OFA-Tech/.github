name: Stage - Verify

on:
  workflow_call:
    inputs:
      language:
        description: Programming language (dotnet, node, java, python, go, php, cpp)
        required: true
        type: string
      language-version:
        description: Runtime version
        required: false
        type: string
        default: ""
      distribution:
        description: Optional Java distribution override
        required: false
        type: string
        default: ""
      working-directory:
        description: Working directory for commands
        required: false
        type: string
        default: .
      runner:
        description: Runner label
        required: false
        type: string
        default: ubuntu-latest
      run-build:
        description: Enables build step
        required: false
        type: boolean
        default: true
      build-command:
        description: Optional build command override
        required: false
        type: string
        default: ""
      run-tests:
        description: Enables test step
        required: false
        type: boolean
        default: true
      test-command:
        description: Optional test command override
        required: false
        type: string
        default: ""
      run-sonar:
        description: Enables SonarQube step
        required: false
        type: boolean
        default: false
      sonar-project-key:
        description: Optional SonarQube project key override
        required: false
        type: string
        default: ""
      sonar-project-name:
        description: Optional SonarQube project name override
        required: false
        type: string
        default: ""
      sonar-sources:
        description: Sonar sources path
        required: false
        type: string
        default: .
      sonar-command:
        description: Optional custom Sonar command
        required: false
        type: string
        default: ""
      enforce-quality-gate:
        description: Fail stage if quality gate is red
        required: false
        type: boolean
        default: false
      sonar-token:
        description: Optional Sonar token override
        required: false
        type: string
        default: ""
      sonar-host-url:
        description: Optional Sonar host URL override
        required: false
        type: string
        default: ""
      upload-artifact:
        description: Upload artifact after build verification
        required: false
        type: boolean
        default: false
      artifact-name:
        description: Artifact name
        required: false
        type: string
        default: build-output
      artifact-path:
        description: Artifact path or glob
        required: false
        type: string
        default: .
    secrets:
      sonar-token:
        required: false
      sonar-host-url:
        required: false

jobs:
  verify:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    env:
      RESOLVED_SONAR_TOKEN: ${{ secrets.sonar-token != '' && secrets.sonar-token || inputs.sonar-token != '' && inputs.sonar-token || secrets.SONAR_TOKEN }}
      RESOLVED_SONAR_HOST_URL: ${{ secrets.sonar-host-url != '' && secrets.sonar-host-url || inputs.sonar-host-url != '' && inputs.sonar-host-url || vars.SONAR_HOST_URL }}
      RESOLVED_SONAR_PROJECT_KEY: ${{ inputs.sonar-project-key != '' && inputs.sonar-project-key || vars.SONAR_PROJECT_KEY }}
      RESOLVED_SONAR_PROJECT_NAME: ${{ inputs.sonar-project-name != '' && inputs.sonar-project-name || vars.SONAR_PROJECT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve language defaults
        id: defaults
        uses: ./actions/resolve-language-defaults
        with:
          language: ${{ inputs.language }}
          version: ${{ inputs.language-version }}
          distribution: ${{ inputs.distribution }}
          build-command: ${{ inputs.build-command }}
          test-command: ${{ inputs.test-command }}

      - name: Setup runtime
        uses: ./actions/setup-runtime
        with:
          language: ${{ steps.defaults.outputs.language }}
          version: ${{ steps.defaults.outputs.version }}
          distribution: ${{ steps.defaults.outputs.distribution }}

      - name: Build
        if: ${{ inputs.run-build && steps.defaults.outputs.build-command != '' }}
        uses: ./actions/run-command
        with:
          command: ${{ steps.defaults.outputs.build-command }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run tests
        if: ${{ inputs.run-tests && steps.defaults.outputs.test-command != '' }}
        uses: ./actions/run-command
        with:
          command: ${{ steps.defaults.outputs.test-command }}
          working-directory: ${{ inputs.working-directory }}

      - name: Validate Sonar configuration
        if: ${{ inputs.run-sonar && (env.RESOLVED_SONAR_TOKEN == '' || env.RESOLVED_SONAR_HOST_URL == '' || env.RESOLVED_SONAR_PROJECT_KEY == '') }}
        shell: bash
        run: |
          echo "Missing Sonar configuration. Ensure token, host URL and project key are available via inputs, secrets, or org/repo vars." >&2
          exit 1

      - name: Run custom Sonar command
        if: ${{ inputs.run-sonar && inputs.sonar-command != '' }}
        uses: ./actions/run-command
        with:
          command: ${{ inputs.sonar-command }}
          working-directory: ${{ inputs.working-directory }}
        env:
          SONAR_TOKEN: ${{ env.RESOLVED_SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.RESOLVED_SONAR_HOST_URL }}

      - name: Run Sonar scan action
        if: ${{ inputs.run-sonar && inputs.sonar-command == '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.RESOLVED_SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.RESOLVED_SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >-
            -Dsonar.projectKey=${{ env.RESOLVED_SONAR_PROJECT_KEY }}
            -Dsonar.projectName=${{ env.RESOLVED_SONAR_PROJECT_NAME }}
            -Dsonar.sources=${{ inputs.sonar-sources }}

      - name: Enforce quality gate
        if: ${{ inputs.run-sonar && inputs.enforce-quality-gate && inputs.sonar-command == '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.RESOLVED_SONAR_TOKEN }}

      - name: Upload build artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
