name: Stage - Rollback

on:
  workflow_call:
    inputs:
      strategy:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: self-hosted
      host:
        required: false
        type: string
        default: ""
      port:
        required: false
        type: string
        default: "22"
      username:
        required: false
        type: string
        default: ""
      ssh-private-key:
        required: false
        type: string
        default: ""
      ssh-rollback-command:
        required: false
        type: string
        default: ""
      docker-mode:
        required: false
        type: string
        default: swarm
      docker-swarm-service-name:
        required: false
        type: string
        default: ""
      docker-rollback-command:
        required: false
        type: string
        default: ""
      portainer-url:
        required: false
        type: string
        default: ""
      endpoint-id:
        required: false
        type: string
        default: ""
      portainer-api-key:
        required: false
        type: string
        default: ""
      portainer-stack-id:
        required: false
        type: string
        default: ""
      portainer-rollback-to:
        required: false
        type: string
        default: ""
      portainer-prune:
        required: false
        type: boolean
        default: false
      portainer-repull-image-and-redeploy:
        required: false
        type: boolean
        default: true

jobs:
  rollback:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - name: Validate rollback configuration
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.strategy }}" in
            portainer)
              [[ -n "${{ inputs.portainer-url }}" ]] || { echo "Missing portainer-url"; exit 1; }
              [[ -n "${{ inputs.endpoint-id }}" ]] || { echo "Missing endpoint-id"; exit 1; }
              [[ -n "${{ inputs.portainer-api-key }}" ]] || { echo "Missing portainer-api-key"; exit 1; }
              [[ -n "${{ inputs.portainer-stack-id }}" ]] || { echo "Missing portainer-stack-id"; exit 1; }
              ;;
            docker)
              [[ -n "${{ inputs.host }}" ]] || { echo "Missing host"; exit 1; }
              [[ -n "${{ inputs.username }}" ]] || { echo "Missing username"; exit 1; }
              [[ -n "${{ inputs.ssh-private-key }}" ]] || { echo "Missing ssh-private-key"; exit 1; }
              if [[ "${{ inputs.docker-mode }}" = "swarm" ]]; then
                [[ -n "${{ inputs.docker-swarm-service-name }}" ]] || { echo "Missing docker-swarm-service-name"; exit 1; }
              else
                [[ -n "${{ inputs.docker-rollback-command }}" ]] || { echo "Missing docker-rollback-command"; exit 1; }
              fi
              ;;
            ssh-artifact)
              [[ -n "${{ inputs.host }}" ]] || { echo "Missing host"; exit 1; }
              [[ -n "${{ inputs.username }}" ]] || { echo "Missing username"; exit 1; }
              [[ -n "${{ inputs.ssh-private-key }}" ]] || { echo "Missing ssh-private-key"; exit 1; }
              [[ -n "${{ inputs.ssh-rollback-command }}" ]] || { echo "Missing ssh-rollback-command"; exit 1; }
              ;;
            *)
              echo "Unsupported strategy: ${{ inputs.strategy }}" >&2
              exit 1
              ;;
          esac

      - name: Rollback Portainer stack
        if: ${{ inputs.strategy == 'portainer' }}
        uses: ./actions/portainer/rollback
        with:
          portainer-url: ${{ inputs.portainer-url }}
          api-key: ${{ inputs.portainer-api-key }}
          endpoint-id: ${{ inputs.endpoint-id }}
          stack-id: ${{ inputs.portainer-stack-id }}
          rollback-to: ${{ inputs.portainer-rollback-to }}
          prune: ${{ inputs.portainer-prune && 'true' || 'false' }}
          repull-image-and-redeploy: ${{ inputs.portainer-repull-image-and-redeploy && 'true' || 'false' }}

      - name: Rollback Docker Swarm service
        if: ${{ inputs.strategy == 'docker' && inputs.docker-mode == 'swarm' }}
        uses: ./actions/ssh/command
        with:
          host: ${{ inputs.host }}
          port: ${{ inputs.port }}
          username: ${{ inputs.username }}
          ssh-private-key: ${{ inputs.ssh-private-key }}
          script: |
            set -euo pipefail
            docker service rollback "${{ inputs.docker-swarm-service-name }}"

      - name: Rollback Docker standalone
        if: ${{ inputs.strategy == 'docker' && inputs.docker-mode == 'standalone' }}
        uses: ./actions/ssh/command
        with:
          host: ${{ inputs.host }}
          port: ${{ inputs.port }}
          username: ${{ inputs.username }}
          ssh-private-key: ${{ inputs.ssh-private-key }}
          script: |
            set -euo pipefail
            ${{ inputs.docker-rollback-command }}

      - name: Rollback via SSH command
        if: ${{ inputs.strategy == 'ssh-artifact' }}
        uses: ./actions/ssh/command
        with:
          host: ${{ inputs.host }}
          port: ${{ inputs.port }}
          username: ${{ inputs.username }}
          ssh-private-key: ${{ inputs.ssh-private-key }}
          script: |
            set -euo pipefail
            ${{ inputs.ssh-rollback-command }}
