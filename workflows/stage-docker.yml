name: Stage - Docker

on:
  workflow_call:
    outputs:
      image:
        value: ${{ jobs.docker.outputs.image }}
      version:
        value: ${{ jobs.docker.outputs.version }}
      image-version-tag:
        value: ${{ jobs.docker.outputs.image-version-tag }}
      image-latest-tag:
        value: ${{ jobs.docker.outputs.image-latest-tag }}
    inputs:
      runner:
        required: false
        type: string
        default: ubuntu-latest
      registry:
        required: false
        type: string
        default: docker.io
      image-name:
        required: false
        type: string
        default: ""
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      context:
        required: false
        type: string
        default: .
      version:
        required: false
        type: string
        default: ""
      push-latest:
        required: false
        type: boolean
        default: true
      docker-username:
        required: false
        type: string
        default: ""
      docker-password:
        required: false
        type: string
        default: ""

jobs:
  docker:
    runs-on: ${{ inputs.runner }}
    outputs:
      image: ${{ steps.docker.outputs.image }}
      version: ${{ steps.docker.outputs.version }}
      image-version-tag: ${{ steps.docker.outputs.image-version-tag }}
      image-latest-tag: ${{ steps.docker.outputs.image-latest-tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker credentials
        if: ${{ inputs.docker-password == '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Missing docker-password. Resolve it centrally in workflow-templates/ci-cd.yml." >&2
          exit 1

      - name: Build and push docker image
        id: docker
        uses: ./actions/docker/upload
        env:
          DOCKER_USERNAME: ${{ inputs.docker-username }}
        with:
          registry: ${{ inputs.registry }}
          image-name: ${{ inputs.image-name }}
          dockerfile: ${{ inputs.dockerfile }}
          context: ${{ inputs.context }}
          version: ${{ inputs.version }}
          push-latest: ${{ inputs.push-latest && 'true' || 'false' }}
          username: ${{ inputs.docker-username }}
          password: ${{ inputs.docker-password }}
