name: Stage - Portainer

on:
  workflow_call:
    inputs:
      operation:
        description: deploy | rollback | scale
        required: true
        type: string
      service:
        description: Docker Swarm service name or ID
        required: true
        type: string
      image:
        description: Full image reference for deploy
        required: false
        type: string
        default: ""
      replicas:
        description: Replica count for scale
        required: false
        type: string
        default: ""
      endpoint-id:
        description: Portainer endpoint ID
        required: false
        type: string
        default: ""
      portainer-url:
        description: Portainer base URL
        required: false
        type: string
        default: ""
      force-update:
        description: Increment ForceUpdate on deploy
        required: false
        type: boolean
        default: true
      runner:
        description: Runner label
        required: false
        type: string
        default: ubuntu-latest
    secrets:
      portainer-api-key:
        required: false

jobs:
  portainer:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    env:
      RESOLVED_PORTAINER_URL: ${{ inputs.portainer-url != '' && inputs.portainer-url || vars.PORTAINER_URL }}
      RESOLVED_PORTAINER_ENDPOINT_ID: ${{ inputs.endpoint-id != '' && inputs.endpoint-id || vars.PORTAINER_ENDPOINT_ID }}
      RESOLVED_PORTAINER_API_KEY: ${{ secrets.portainer-api-key != '' && secrets.portainer-api-key || secrets.PORTAINER_API_KEY }}
    steps:
      - name: Validate Portainer configuration
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${RESOLVED_PORTAINER_URL}" ]] || { echo "Missing Portainer URL"; exit 1; }
          [[ -n "${RESOLVED_PORTAINER_ENDPOINT_ID}" ]] || { echo "Missing Portainer endpoint ID"; exit 1; }
          [[ -n "${RESOLVED_PORTAINER_API_KEY}" ]] || { echo "Missing Portainer API key"; exit 1; }

      - name: Run Portainer operation
        uses: ./actions/portainer-service
        with:
          portainer-url: ${{ env.RESOLVED_PORTAINER_URL }}
          api-key: ${{ env.RESOLVED_PORTAINER_API_KEY }}
          endpoint-id: ${{ env.RESOLVED_PORTAINER_ENDPOINT_ID }}
          operation: ${{ inputs.operation }}
          service: ${{ inputs.service }}
          image: ${{ inputs.image }}
          replicas: ${{ inputs.replicas }}
          force-update: ${{ inputs.force-update && 'true' || 'false' }}