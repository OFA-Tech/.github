name: Stage - Portainer

on:
  workflow_call:
    inputs:
      operation:
        required: true
        type: string
      stack-type:
        required: false
        type: string
        default: swarm
      stack-id:
        required: false
        type: string
        default: ""
      stack-name:
        required: false
        type: string
        default: ""
      stack-file-content:
        required: false
        type: string
        default: ""
      swarm-id:
        required: false
        type: string
        default: ""
      rollback-to:
        required: false
        type: string
        default: ""
      env-json:
        required: false
        type: string
        default: ""
      prune:
        required: false
        type: boolean
        default: false
      repull-image-and-redeploy:
        required: false
        type: boolean
        default: true
      prefer-git-redeploy:
        required: false
        type: boolean
        default: true
      endpoint-id:
        required: false
        type: string
        default: ""
      portainer-url:
        required: false
        type: string
        default: ""
      portainer-api-key:
        required: false
        type: string
        default: ""
      runner:
        required: false
        type: string
        default: ubuntu-latest

jobs:
  portainer:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - name: Validate Portainer configuration
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${{ inputs.portainer-url }}" ]] || { echo "Missing portainer-url"; exit 1; }
          [[ -n "${{ inputs.endpoint-id }}" ]] || { echo "Missing endpoint-id"; exit 1; }
          [[ -n "${{ inputs.portainer-api-key }}" ]] || { echo "Missing portainer-api-key"; exit 1; }

      - name: Run Portainer operation
        if: ${{ inputs.operation == 'deploy' || inputs.operation == 'update' }}
        uses: ./actions/portainer/deploy-update
        with:
          portainer-url: ${{ inputs.portainer-url }}
          api-key: ${{ inputs.portainer-api-key }}
          endpoint-id: ${{ inputs.endpoint-id }}
          stack-type: ${{ inputs.stack-type }}
          operation: ${{ inputs.operation }}
          stack-id: ${{ inputs.stack-id }}
          stack-name: ${{ inputs.stack-name }}
          stack-file-content: ${{ inputs.stack-file-content }}
          swarm-id: ${{ inputs.swarm-id }}
          env-json: ${{ inputs.env-json }}
          prune: ${{ inputs.prune && 'true' || 'false' }}
          repull-image-and-redeploy: ${{ inputs.repull-image-and-redeploy && 'true' || 'false' }}
          prefer-git-redeploy: ${{ inputs.prefer-git-redeploy && 'true' || 'false' }}

      - name: Rollback Portainer stack
        if: ${{ inputs.operation == 'rollback' }}
        uses: ./actions/portainer/rollback
        with:
          portainer-url: ${{ inputs.portainer-url }}
          api-key: ${{ inputs.portainer-api-key }}
          endpoint-id: ${{ inputs.endpoint-id }}
          stack-id: ${{ inputs.stack-id }}
          rollback-to: ${{ inputs.rollback-to }}
          prune: ${{ inputs.prune && 'true' || 'false' }}
          repull-image-and-redeploy: ${{ inputs.repull-image-and-redeploy && 'true' || 'false' }}

      - name: Scale Portainer stack
        if: ${{ inputs.operation == 'scale' }}
        uses: ./actions/portainer/scale
        with:
          portainer-url: ${{ inputs.portainer-url }}
          api-key: ${{ inputs.portainer-api-key }}
          endpoint-id: ${{ inputs.endpoint-id }}
          stack-id: ${{ inputs.stack-id }}
          stack-file-content: ${{ inputs.stack-file-content }}
          prune: ${{ inputs.prune && 'true' || 'false' }}
          repull-image-and-redeploy: ${{ inputs.repull-image-and-redeploy && 'true' || 'false' }}
