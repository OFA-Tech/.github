name: Stage - Deploy

on:
  workflow_call:
    inputs:
      deploy-mode:
        required: false
        type: string
        default: sftp
      artifact-name:
        required: true
        type: string
      artifact-path:
        required: false
        type: string
        default: ./artifact
      host:
        required: false
        type: string
        default: ""
      port:
        required: false
        type: string
        default: "22"
      username:
        required: false
        type: string
        default: ""
      remote-path:
        required: false
        type: string
        default: ""
      ssh-private-key:
        required: false
        type: string
        default: ""
      docker-image:
        required: false
        type: string
        default: ""
      docker-compose-file:
        required: false
        type: string
        default: docker-compose.yml
      docker-run-command:
        required: false
        type: string
        default: ""
      docker-swarm-service-name:
        required: false
        type: string
        default: ""
      docker-swarm-replicas:
        required: false
        type: string
        default: ""
      docker-registry:
        required: false
        type: string
        default: docker.io
      docker-username:
        required: false
        type: string
        default: ""
      docker-password:
        required: false
        type: string
        default: ""
      source-glob:
        required: false
        type: string
        default: "**/*"
      strip-components:
        required: false
        type: string
        default: "0"
      overwrite:
        required: false
        type: boolean
        default: true
      clean-remote:
        required: false
        type: boolean
        default: false
      runner:
        required: false
        type: string
        default: ubuntu-latest

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - name: Validate deploy configuration
        if: ${{ inputs.host == '' || inputs.username == '' || inputs.remote-path == '' || inputs.ssh-private-key == '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Missing deploy configuration. host, username, remote-path and ssh-private-key are required after central resolution." >&2
          exit 1

      - name: Download artifact
        if: ${{ inputs.deploy-mode == 'sftp' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}

      - name: Upload to SFTP
        if: ${{ inputs.deploy-mode == 'sftp' }}
        uses: ./actions/ssh/upload
        with:
          host: ${{ inputs.host }}
          port: ${{ inputs.port }}
          username: ${{ inputs.username }}
          source: ${{ inputs.artifact-path }}/${{ inputs.source-glob }}
          target: ${{ inputs.remote-path }}
          strip-components: ${{ inputs.strip-components }}
          overwrite: ${{ inputs.overwrite }}
          clean-remote: ${{ inputs.clean-remote }}
          ssh-private-key: ${{ inputs.ssh-private-key }}

      - name: Validate docker deploy configuration
        if: ${{ (inputs.deploy-mode == 'docker-compose' || inputs.deploy-mode == 'docker-run' || inputs.deploy-mode == 'docker-swarm') && inputs.docker-image == '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "docker-image is required for docker deploy modes." >&2
          exit 1

      - name: Deploy with docker compose
        if: ${{ inputs.deploy-mode == 'docker-compose' }}
        uses: ./actions/ssh/command
        with:
          host: ${{ inputs.host }}
          port: ${{ inputs.port }}
          username: ${{ inputs.username }}
          ssh-private-key: ${{ inputs.ssh-private-key }}
          script: |
            set -euo pipefail
            if [ -n "${{ inputs.docker-password }}" ]; then
              echo "${{ inputs.docker-password }}" | docker login "${{ inputs.docker-registry }}" -u "${{ inputs.docker-username }}" --password-stdin
            fi
            docker pull "${{ inputs.docker-image }}"
            docker compose -f "${{ inputs.docker-compose-file }}" up -d

      - name: Validate docker-run deploy configuration
        if: ${{ inputs.deploy-mode == 'docker-run' && inputs.docker-run-command == '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "docker-run-command is required for deploy-mode docker-run." >&2
          exit 1

      - name: Validate docker-swarm deploy configuration
        if: ${{ inputs.deploy-mode == 'docker-swarm' && inputs.docker-swarm-service-name == '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "docker-swarm-service-name is required for deploy-mode docker-swarm." >&2
          exit 1

      - name: Deploy with docker run
        if: ${{ inputs.deploy-mode == 'docker-run' }}
        uses: ./actions/ssh/command
        with:
          host: ${{ inputs.host }}
          port: ${{ inputs.port }}
          username: ${{ inputs.username }}
          ssh-private-key: ${{ inputs.ssh-private-key }}
          script: |
            set -euo pipefail
            if [ -n "${{ inputs.docker-password }}" ]; then
              echo "${{ inputs.docker-password }}" | docker login "${{ inputs.docker-registry }}" -u "${{ inputs.docker-username }}" --password-stdin
            fi
            docker pull "${{ inputs.docker-image }}"
            docker ${{ inputs.docker-run-command }}

      - name: Deploy with docker swarm service
        if: ${{ inputs.deploy-mode == 'docker-swarm' }}
        uses: ./actions/ssh/command
        with:
          host: ${{ inputs.host }}
          port: ${{ inputs.port }}
          username: ${{ inputs.username }}
          ssh-private-key: ${{ inputs.ssh-private-key }}
          script: |
            set -euo pipefail
            if [ -n "${{ inputs.docker-password }}" ]; then
              echo "${{ inputs.docker-password }}" | docker login "${{ inputs.docker-registry }}" -u "${{ inputs.docker-username }}" --password-stdin
            fi
            docker pull "${{ inputs.docker-image }}"
            if docker service inspect "${{ inputs.docker-swarm-service-name }}" >/dev/null 2>&1; then
              if [ -n "${{ inputs.docker-swarm-replicas }}" ]; then
                docker service update --image "${{ inputs.docker-image }}" --replicas "${{ inputs.docker-swarm-replicas }}" "${{ inputs.docker-swarm-service-name }}"
              else
                docker service update --image "${{ inputs.docker-image }}" "${{ inputs.docker-swarm-service-name }}"
              fi
            else
              if [ -n "${{ inputs.docker-swarm-replicas }}" ]; then
                docker service create --name "${{ inputs.docker-swarm-service-name }}" --replicas "${{ inputs.docker-swarm-replicas }}" "${{ inputs.docker-image }}"
              else
                docker service create --name "${{ inputs.docker-swarm-service-name }}" "${{ inputs.docker-image }}"
              fi
            fi
