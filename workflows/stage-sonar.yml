name: Stage - SonarQube

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      language-version:
        required: false
        type: string
        default: ""
      distribution:
        required: false
        type: string
        default: ""
      working-directory:
        required: false
        type: string
        default: .
      runner:
        required: false
        type: string
        default: ubuntu-latest
      sonar-project-key:
        required: false
        type: string
        default: ""
      sonar-project-name:
        required: false
        type: string
        default: ""
      sonar-sources:
        required: false
        type: string
        default: .
      sonar-command:
        required: false
        type: string
        default: ""
      enforce-quality-gate:
        required: false
        type: boolean
        default: false
      sonar-token:
        required: false
        type: string
        default: ""
      sonar-host-url:
        required: false
        type: string
        default: ""

jobs:
  sonar:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Sonar configuration
        if: ${{ inputs.sonar-token == '' || inputs.sonar-host-url == '' || inputs.sonar-project-key == '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Missing Sonar configuration. Resolve it centrally in workflow-templates/ci-cd.yml." >&2
          exit 1

      - name: Resolve language defaults
        id: defaults
        uses: ./actions/setup/resolve
        with:
          language: ${{ inputs.language }}
          version: ${{ inputs.language-version }}
          distribution: ${{ inputs.distribution }}

      - name: Setup runtime
        uses: ./actions/setup/runtime
        with:
          language: ${{ steps.defaults.outputs.language }}
          version: ${{ steps.defaults.outputs.version }}
          distribution: ${{ steps.defaults.outputs.distribution }}

      - name: Run custom Sonar command
        if: ${{ inputs.sonar-command != '' }}
        uses: ./actions/run-command
        with:
          command: ${{ inputs.sonar-command }}
          working-directory: ${{ inputs.working-directory }}
        env:
          SONAR_TOKEN: ${{ inputs.sonar-token }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}

      - name: Run Sonar scan action
        if: ${{ inputs.sonar-command == '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ inputs.sonar-token }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >-
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.projectName=${{ inputs.sonar-project-name }}
            -Dsonar.sources=${{ inputs.sonar-sources }}

      - name: Enforce quality gate
        if: ${{ inputs.enforce-quality-gate && inputs.sonar-command == '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ inputs.sonar-token }}
